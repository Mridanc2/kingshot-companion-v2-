<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Gear Command Center · Kingshot Red Gear</title>
<meta name="description" content="Gear Command Center — track your Kingshot Red Gear progression and run your alliance gear board. Strategy by Shakes." />
<meta name="theme-color" content="#080d18" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Red Gear" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  html, body { margin: 0; background: #080d18; }
  * { box-sizing: border-box; }
  #root > div { max-width: 520px; margin-inline: auto; }
  #__boot { color: #94a3bd; font-family: system-ui, sans-serif; text-align: center; padding: 80px 20px; }
</style>
<script>
  // Persistence shim: outside Claude there is no window.storage, so back it with localStorage.
  if (!window.storage) {
    window.storage = {
      get: function (k) { try { var v = localStorage.getItem('kp_' + k); return Promise.resolve(v == null ? null : { key: k, value: v }); } catch (e) { return Promise.resolve(null); } },
      set: function (k, v) { try { localStorage.setItem('kp_' + k, v); } catch (e) {} return Promise.resolve({ key: k, value: v }); },
      delete: function (k) { try { localStorage.removeItem('kp_' + k); } catch (e) {} return Promise.resolve({ key: k, deleted: true }); },
      list: function () { try { var ks = []; for (var i = 0; i < localStorage.length; i++) { var key = localStorage.key(i); if (key && key.indexOf('kp_') === 0) ks.push(key.slice(3)); } return Promise.resolve({ keys: ks }); } catch (e) { return Promise.resolve({ keys: [] }); } }
    };
  }
</script>
<script>
/* Companion v2 profile bridge (v9.42): (a) seed empty resources; (b) write Red-gear %; (c) apply v2 font (ks_font). Guarded, additive. */
(function(){
  function seed(){try{
    var prof=JSON.parse(localStorage.getItem('ks_profile')||'null'); if(!prof||!prof.resources) return;
    var raw=localStorage.getItem('kingshot-path-v1'); if(!raw) return;
    var st=JSON.parse(raw); if(!st||typeof st!=='object'||!st.resources||typeof st.resources!=='object') return;
    var ch=false; [['hammers','hammers'],['mithril','mithril'],['mythicGears','gears']].forEach(function(p){
      var c=parseInt(st.resources[p[0]])||0,v=parseInt(prof.resources[p[1]])||0; if(c===0&&v>0){st.resources[p[0]]=v;ch=true;}});
    if(ch) localStorage.setItem('kingshot-path-v1', JSON.stringify(st));
  }catch(e){}}
  function writeProgress(){try{
    var raw=localStorage.getItem('kingshot-path-v1'); if(!raw) return;
    var st=JSON.parse(raw); if(!st||!st.gear) return;
    var red=0,total=0; for(var k in st.gear){ total++; if(st.gear[k]&&st.gear[k].rarity==='red') red++; }
    var pct=total?Math.round(red/total*100):0;
    var prof=JSON.parse(localStorage.getItem('ks_profile')||'{}');
    if(prof.gearProgress!==pct){ prof.gearProgress=pct; localStorage.setItem('ks_profile', JSON.stringify(prof)); }
  }catch(e){}}
  function applyFont(){try{
    var f=localStorage.getItem('ks_font')||'system';
    var map={system:'system-ui,-apple-system,"Segoe UI",Roboto,sans-serif',nunito:"'Nunito Sans',system-ui,sans-serif",cinzel:"'Cinzel',Georgia,serif",inter:"'Inter',system-ui,sans-serif"};
    var fam=map[f]||map.system;
    if(f!=='system' && !document.getElementById('ks-font-link')){
      var l=document.createElement('link'); l.id='ks-font-link'; l.rel='stylesheet';
      l.href='https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&family=Cinzel:wght@600&family=Inter:wght@400;600&display=swap'; document.head.appendChild(l);
    }
    var st=document.getElementById('ks-font-style'); if(!st){st=document.createElement('style');st.id='ks-font-style';document.head.appendChild(st);}
    st.textContent='body{font-family:'+fam+' !important;}';
  }catch(e){}}
  function go(){ seed(); applyFont(); setTimeout(writeProgress,1500); setInterval(writeProgress,4000); }
  if(document.readyState!=='loading') go(); else document.addEventListener('DOMContentLoaded',go);
  window.addEventListener('storage',function(e){ if(e.key==='ks_font') applyFont(); });
})();
</script>

    "upload.help": { en: "Upload one screenshot per troop hero (showing all 4 gear pieces). Resources are entered manually below. Or tap any slot below to enter gear manually.", es: "Sube una captura por h\xE9roe (mostrando las 4 piezas). Los recursos se ingresan manualmente abajo. O toca cualquier ranura para a\xF1adir equipo manualmente.", pt: "Envie uma captura por her\xF3i (mostrando as 4 pe\xE7as). Os recursos s\xE3o inseridos manualmente abaixo. Ou toque em qualquer slot para inserir manualmente.", fr: "T\xE9l\xE9verse une capture par h\xE9ros (avec les 4 pi\xE8ces). Les ressources se saisissent manuellement ci-dessous. Ou touche une case pour saisir l\u2019\xE9quipement manuellement.", de: "Lade pro Held einen Screenshot hoch (alle 4 Teile sichtbar). Ressourcen werden unten manuell eingegeben. Oder tippe ein Feld an, um Ausr\xFCstung manuell einzugeben.", it: "Carica uno screenshot per eroe (con tutti i 4 pezzi). Le risorse si inseriscono manualmente sotto. Oppure tocca uno slot per inserire l\u2019equipaggiamento a mano.", nl: "Upload \xE9\xE9n screenshot per held (alle 4 stukken zichtbaar). Bronnen voer je hieronder handmatig in. Of tik op een vak om uitrusting handmatig in te voeren.", ru: "\u0417\u0430\u0433\u0440\u0443\u0437\u0438\u0442\u0435 \u043F\u043E \u043E\u0434\u043D\u043E\u043C\u0443 \u0441\u043A\u0440\u0438\u043D\u0448\u043E\u0442\u0443 \u043D\u0430 \u0433\u0435\u0440\u043E\u044F (\u0432\u0438\u0434\u043D\u044B \u0432\u0441\u0435 4 \u043F\u0440\u0435\u0434\u043C\u0435\u0442\u0430). \u0420\u0435\u0441\u0443\u0440\u0441\u044B \u0432\u0432\u043E\u0434\u044F\u0442\u0441\u044F \u0432\u0440\u0443\u0447\u043D\u0443\u044E \u043D\u0438\u0436\u0435. \u0418\u043B\u0438 \u043D\u0430\u0436\u043C\u0438\u0442\u0435 \u0441\u043B\u043E\u0442, \u0447\u0442\u043E\u0431\u044B \u0432\u0432\u0435\u0441\u0442\u0438 \u0441\u043D\u0430\u0440\u044F\u0436\u0435\u043D\u0438\u0435 \u0432\u0440\u0443\u0447\u043D\u0443\u044E.", pl: "Prze\u015Blij jeden zrzut na bohatera (wszystkie 4 cz\u0119\u015Bci). Zasoby wpisujesz r\u0119cznie poni\u017Cej. Albo dotknij slotu, aby doda\u0107 sprz\u0119t r\u0119cznie.", tr: "Her kahraman i\xE7in bir ekran g\xF6r\xFCnt\xFCs\xFC y\xFCkle (4 par\xE7a da g\xF6r\xFCns\xFCn). Kaynaklar a\u015Fa\u011F\u0131dan elle girilir. Ya da bir yuvaya dokunup ekipman\u0131 elle gir.", ar: "\u0627\u0631\u0641\u0639 \u0644\u0642\u0637\u0629 \u0644\u0643\u0644 \u0628\u0637\u0644 (\u062A\u0638\u0647\u0631 \u0627\u0644\u0642\u0637\u0639 \u0627\u0644\u0623\u0631\u0628\u0639). \u062A\u064F\u062F\u062E\u0644 \u0627\u0644\u0645\u0648\u0627\u0631\u062F \u064A\u062F\u0648\u064A\u064B\u0627 \u0628\u0627\u0644\u0623\u0633\u0641\u0644. \u0623\u0648 \u0627\u0636\u063A\u0637 \u0623\u064A \u062E\u0627\u0646\u0629 \u0644\u0625\u062F\u062E\u0627\u0644 \u0627\u0644\u0639\u062A\u0627\u062F \u064A\u062F\u0648\u064A\u064B\u0627.", he: "\u05D4\u05E2\u05DC\u05D4 \u05E6\u05D9\u05DC\u05D5\u05DD \u05DE\u05E1\u05DA \u05D0\u05D7\u05D3 \u05DC\u05DB\u05DC \u05D2\u05D9\u05D1\u05D5\u05E8 (\u05DB\u05DC 4 \u05D4\u05E4\u05E8\u05D9\u05D8\u05D9\u05DD \u05E0\u05E8\u05D0\u05D9\u05DD). \u05D4\u05DE\u05E9\u05D0\u05D1\u05D9\u05DD \u05DE\u05D5\u05D6\u05E0\u05D9\u05DD \u05D9\u05D3\u05E0\u05D9\u05EA \u05DC\u05DE\u05D8\u05D4. \u05D0\u05D5 \u05D4\u05E7\u05E9 \u05E2\u05DC \u05DE\u05E9\u05D1\u05E6\u05EA \u05DB\u05D3\u05D9 \u05DC\u05D4\u05D6\u05D9\u05DF \u05E6\u05D9\u05D5\u05D3 \u05D9\u05D3\u05E0\u05D9\u05EA.", zh: "\u6BCF\u4E2A\u82F1\u96C4\u4E0A\u4F20\u4E00\u5F20\u622A\u56FE\uFF08\u663E\u793A\u5168\u90E84\u4EF6\u88C5\u5907\uFF09\u3002\u8D44\u6E90\u5728\u4E0B\u65B9\u624B\u52A8\u8F93\u5165\u3002\u6216\u70B9\u51FB\u4EFB\u610F\u69FD\u4F4D\u624B\u52A8\u8F93\u5165\u88C5\u5907\u3002", ja: "\u30D2\u30FC\u30ED\u30FC\u3054\u3068\u306B1\u679A\u306E\u30B9\u30AF\u30B7\u30E7\u3092\u30A2\u30C3\u30D7\uFF084\u90E8\u4F4D\u3059\u3079\u3066\u8868\u793A\uFF09\u3002\u30EA\u30BD\u30FC\u30B9\u306F\u4E0B\u3067\u624B\u52D5\u5165\u529B\u3002\u307E\u305F\u306F\u67A0\u3092\u30BF\u30C3\u30D7\u3057\u3066\u624B\u52D5\u5165\u529B\u3002", ko: "\uC601\uC6C5\uB9C8\uB2E4 \uC2A4\uD06C\uB9B0\uC0F7 1\uC7A5 \uC5C5\uB85C\uB4DC(4\uBD80\uC704 \uBAA8\uB450 \uD45C\uC2DC). \uC790\uC6D0\uC740 \uC544\uB798\uC5D0\uC11C \uC9C1\uC811 \uC785\uB825. \uB610\uB294 \uC2AC\uB86F\uC744 \uB20C\uB7EC \uC9C1\uC811 \uC785\uB825.", id: "Unggah satu tangkapan per hero (semua 4 gear terlihat). Sumber daya diisi manual di bawah. Atau ketuk slot untuk isi manual.", vi: "T\u1EA3i m\u1ED9t \u1EA3nh ch\u1EE5p m\u1ED7i t\u01B0\u1EDBng (hi\u1EC7n \u0111\u1EE7 4 m\xF3n). T\xE0i nguy\xEAn nh\u1EADp tay b\xEAn d\u01B0\u1EDBi. Ho\u1EB7c ch\u1EA1m \xF4 b\u1EA5t k\u1EF3 \u0111\u1EC3 nh\u1EADp th\u1EE7 c\xF4ng.", th: "\u0E2D\u0E31\u0E1B\u0E42\u0E2B\u0E25\u0E14\u0E20\u0E32\u0E1E\u0E2B\u0E19\u0E49\u0E32\u0E08\u0E2D\u0E2B\u0E19\u0E36\u0E48\u0E07\u0E20\u0E32\u0E1E\u0E15\u0E48\u0E2D\u0E2E\u0E35\u0E42\u0E23\u0E48 (\u0E40\u0E2B\u0E47\u0E19\u0E04\u0E23\u0E1A 4 \u0E0A\u0E34\u0E49\u0E19) \u0E17\u0E23\u0E31\u0E1E\u0E22\u0E32\u0E01\u0E23\u0E01\u0E23\u0E2D\u0E01\u0E40\u0E2D\u0E07\u0E14\u0E49\u0E32\u0E19\u0E25\u0E48\u0E32\u0E07 \u0E2B\u0E23\u0E37\u0E2D\u0E41\u0E15\u0E30\u0E0A\u0E48\u0E2D\u0E07\u0E43\u0E14\u0E01\u0E47\u0E44\u0E14\u0E49\u0E40\u0E1E\u0E37\u0E48\u0E2D\u0E01\u0E23\u0E2D\u0E01\u0E40\u0E2D\u0E07" },

    "roster.removeConfirm": { en: "Remove {name} from the alliance roster? They can re-join later with the invite link.", es: "\xBFQuitar a {name} del plantel? Puede volver con el enlace de invitaci\xF3n.", pt: "Remover {name} do elenco? Pode voltar com o link de convite.", fr: "Retirer {name} de l\u2019effectif ? Il pourra revenir avec le lien d\u2019invitation.", de: "{name} aus dem Kader entfernen? Kann sp\xE4ter per Einladungslink zur\xFCckkehren.", it: "Rimuovere {name} dal roster? Pu\xF2 rientrare col link d\u2019invito.", nl: "{name} uit het rooster verwijderen? Kan later terugkomen via de uitnodigingslink.", ru: "\u0423\u0434\u0430\u043B\u0438\u0442\u044C {name} \u0438\u0437 \u0441\u043E\u0441\u0442\u0430\u0432\u0430? \u0421\u043C\u043E\u0436\u0435\u0442 \u0432\u0435\u0440\u043D\u0443\u0442\u044C\u0441\u044F \u043F\u043E \u0441\u0441\u044B\u043B\u043A\u0435-\u043F\u0440\u0438\u0433\u043B\u0430\u0448\u0435\u043D\u0438\u044E.", pl: "Usun\u0105\u0107 {name} ze sk\u0142adu? Mo\u017Ce wr\xF3ci\u0107 przez link zaproszenia.", tr: "{name} kadrodan \xE7\u0131kar\u0131ls\u0131n m\u0131? Davet ba\u011Flant\u0131s\u0131yla geri kat\u0131labilir.", ar: "\u0625\u0632\u0627\u0644\u0629 {name} \u0645\u0646 \u0627\u0644\u0642\u0627\u0626\u0645\u0629\u061F \u064A\u0645\u0643\u0646\u0647 \u0627\u0644\u0639\u0648\u062F\u0629 \u0628\u0631\u0627\u0628\u0637 \u0627\u0644\u062F\u0639\u0648\u0629.", he: "\u05DC\u05D4\u05E1\u05D9\u05E8 \u05D0\u05EA {name} \u05DE\u05D4\u05DE\u05E6\u05D1\u05EA? \u05D0\u05E4\u05E9\u05E8 \u05DC\u05D7\u05D6\u05D5\u05E8 \u05E2\u05DD \u05E7\u05D9\u05E9\u05D5\u05E8 \u05D4\u05D4\u05D6\u05DE\u05E0\u05D4.", zh: "\u5C06 {name} \u79FB\u51FA\u540D\u518C\uFF1F\u4E4B\u540E\u53EF\u7528\u9080\u8BF7\u94FE\u63A5\u91CD\u65B0\u52A0\u5165\u3002", ja: "{name} \u3092\u30ED\u30B9\u30BF\u30FC\u304B\u3089\u524A\u9664\uFF1F\u62DB\u5F85\u30EA\u30F3\u30AF\u3067\u518D\u53C2\u52A0\u3067\u304D\u307E\u3059\u3002", ko: "{name}\uC744(\uB97C) \uB85C\uC2A4\uD130\uC5D0\uC11C \uC81C\uAC70\uD560\uAE4C\uC694? \uCD08\uB300 \uB9C1\uD06C\uB85C \uB2E4\uC2DC \uCC38\uAC00\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.", id: "Keluarkan {name} dari daftar? Bisa gabung lagi via tautan undangan.", vi: "X\xF3a {name} kh\u1ECFi danh s\xE1ch? C\xF3 th\u1EC3 tham gia l\u1EA1i b\u1EB1ng link m\u1EDDi.", th: "\u0E19\u0E33 {name} \u0E2D\u0E2D\u0E01\u0E08\u0E32\u0E01\u0E23\u0E32\u0E22\u0E0A\u0E37\u0E48\u0E2D? \u0E40\u0E02\u0E49\u0E32\u0E23\u0E48\u0E27\u0E21\u0E43\u0E2B\u0E21\u0E48\u0E44\u0E14\u0E49\u0E14\u0E49\u0E27\u0E22\u0E25\u0E34\u0E07\u0E01\u0E4C\u0E40\u0E0A\u0E34\u0E0D" },
    "setup.invited": { en: "You\u2019ve been invited to join {code}. Tap Join.", es: "Te han invitado a unirte a {code}. Toca Unirse.", pt: "Voc\xEA foi convidado para {code}. Toque em Entrar.", fr: "Tu es invit\xE9 \xE0 rejoindre {code}. Touche Rejoindre.", de: "Du wurdest zu {code} eingeladen. Tippe auf Beitreten.", it: "Sei stato invitato in {code}. Tocca Unisciti.", nl: "Je bent uitgenodigd voor {code}. Tik op Deelnemen.", ru: "\u0412\u0430\u0441 \u043F\u0440\u0438\u0433\u043B\u0430\u0441\u0438\u043B\u0438 \u0432 {code}. \u041D\u0430\u0436\u043C\u0438\u0442\u0435 \xAB\u0412\u043E\u0439\u0442\u0438\xBB.", pl: "Zaproszono Ci\u0119 do {code}. Dotknij Do\u0142\u0105cz.", tr: "{code} ittifak\u0131na davet edildin. Kat\u0131l\u2019a dokun.", ar: "\u062A\u0645\u062A \u062F\u0639\u0648\u062A\u0643 \u0644\u0644\u0627\u0646\u0636\u0645\u0627\u0645 \u0625\u0644\u0649 {code}. \u0627\u0646\u0642\u0631 \u0627\u0646\u0636\u0645\u0627\u0645.", he: "\u05D4\u05D5\u05D6\u05DE\u05E0\u05EA \u05DC\u05D4\u05E6\u05D8\u05E8\u05E3 \u05DC-{code}. \u05D4\u05E7\u05E9 \u05D4\u05E6\u05D8\u05E8\u05E3.", zh: "\u4F60\u88AB\u9080\u8BF7\u52A0\u5165 {code}\u3002\u70B9\u6309\u52A0\u5165\u3002", ja: "{code} \u306B\u62DB\u5F85\u3055\u308C\u307E\u3057\u305F\u3002\u53C2\u52A0\u3092\u30BF\u30C3\u30D7\u3002", ko: "{code}\uC5D0 \uCD08\uB300\uB418\uC5C8\uC2B5\uB2C8\uB2E4. \uCC38\uAC00\uB97C \uB204\uB974\uC138\uC694.", id: "Kamu diundang ke {code}. Ketuk Gabung.", vi: "B\u1EA1n \u0111\u01B0\u1EE3c m\u1EDDi v\xE0o {code}. Ch\u1EA1m Tham gia.", th: "\u0E04\u0E38\u0E13\u0E44\u0E14\u0E49\u0E23\u0E31\u0E1A\u0E40\u0E0A\u0E34\u0E0D\u0E40\u0E02\u0E49\u0E32\u0E23\u0E48\u0E27\u0E21 {code} \u0E41\u0E15\u0E30\u0E40\u0E02\u0E49\u0E32\u0E23\u0E48\u0E27\u0E21" },
    "setup.createWarn": { en: "This starts a brand-new alliance. Only do this if you\u2019re the leader. If your alliance already exists, go Back and Join with its invite link instead.", es: "Esto crea una alianza nueva. Hazlo solo si eres el l\xEDder. Si tu alianza ya existe, vuelve y \xDAnete con su enlace.", pt: "Isto cria uma alian\xE7a nova. S\xF3 fa\xE7a se for o l\xEDder. Se sua alian\xE7a j\xE1 existe, volte e Entre com o link dela.", fr: "Ceci cr\xE9e une toute nouvelle alliance. \xC0 ne faire que si tu es le chef. Si ton alliance existe d\xE9j\xE0, reviens et Rejoins via son lien.", de: "Dies erstellt eine ganz neue Allianz. Nur als Leiter tun. Existiert deine Allianz schon, geh zur\xFCck und tritt per Link bei.", it: "Questo crea una nuova alleanza. Fallo solo se sei il leader. Se la tua alleanza esiste gi\xE0, torna e Unisciti col suo link.", nl: "Dit maakt een gloednieuwe alliantie. Doe dit alleen als leider. Bestaat je alliantie al, ga terug en sluit je aan via de link.", ru: "\u042D\u0442\u043E \u0441\u043E\u0437\u0434\u0430\u0451\u0442 \u043D\u043E\u0432\u044B\u0439 \u0430\u043B\u044C\u044F\u043D\u0441. \u0422\u043E\u043B\u044C\u043A\u043E \u0435\u0441\u043B\u0438 \u0432\u044B \u043B\u0438\u0434\u0435\u0440. \u0415\u0441\u043B\u0438 \u0430\u043B\u044C\u044F\u043D\u0441 \u0443\u0436\u0435 \u0435\u0441\u0442\u044C \u2014 \u043D\u0430\u0437\u0430\u0434 \u0438 \u0432\u043E\u0439\u0434\u0438\u0442\u0435 \u043F\u043E \u0441\u0441\u044B\u043B\u043A\u0435.", pl: "To tworzy nowy sojusz. Tylko je\u015Bli jeste\u015B liderem. Je\u015Bli sojusz ju\u017C istnieje, wr\xF3\u0107 i do\u0142\u0105cz przez link.", tr: "Bu yepyeni bir ittifak kurar. Sadece liderken yap. \u0130ttifak\u0131n varsa geri d\xF6n ve davet ba\u011Flant\u0131s\u0131yla kat\u0131l.", ar: "\u0647\u0630\u0627 \u064A\u0646\u0634\u0626 \u062A\u062D\u0627\u0644\u0641\u064B\u0627 \u062C\u062F\u064A\u062F\u064B\u0627. \u0627\u0641\u0639\u0644 \u0630\u0644\u0643 \u0641\u0642\u0637 \u0625\u0646 \u0643\u0646\u062A \u0627\u0644\u0642\u0627\u0626\u062F. \u0625\u0646 \u0643\u0627\u0646 \u062A\u062D\u0627\u0644\u0641\u0643 \u0645\u0648\u062C\u0648\u062F\u064B\u0627\u060C \u0627\u0631\u062C\u0639 \u0648\u0627\u0646\u0636\u0645 \u0628\u0631\u0627\u0628\u0637 \u0627\u0644\u062F\u0639\u0648\u0629.", he: "\u05D6\u05D4 \u05D9\u05D5\u05E6\u05E8 \u05D1\u05E8\u05D9\u05EA \u05D7\u05D3\u05E9\u05D4 \u05DC\u05D2\u05DE\u05E8\u05D9. \u05E2\u05E9\u05D4 \u05D6\u05D0\u05EA \u05E8\u05E7 \u05D0\u05DD \u05D0\u05EA\u05D4 \u05D4\u05DE\u05E0\u05D4\u05D9\u05D2. \u05D0\u05DD \u05D4\u05D1\u05E8\u05D9\u05EA \u05DB\u05D1\u05E8 \u05E7\u05D9\u05D9\u05DE\u05EA, \u05D7\u05D6\u05D5\u05E8 \u05D5\u05D4\u05E6\u05D8\u05E8\u05E3 \u05E2\u05DD \u05E7\u05D9\u05E9\u05D5\u05E8 \u05D4\u05D4\u05D6\u05DE\u05E0\u05D4.", zh: "\u8FD9\u4F1A\u521B\u5EFA\u4E00\u4E2A\u5168\u65B0\u8054\u76DF\u3002\u53EA\u6709\u961F\u957F\u624D\u8BE5\u8FD9\u4E48\u505A\u3002\u5982\u679C\u8054\u76DF\u5DF2\u5B58\u5728\uFF0C\u8BF7\u8FD4\u56DE\u5E76\u7528\u9080\u8BF7\u94FE\u63A5\u52A0\u5165\u3002", ja: "\u3053\u308C\u306F\u5168\u304F\u65B0\u3057\u3044\u540C\u76DF\u3092\u4F5C\u308A\u307E\u3059\u3002\u30EA\u30FC\u30C0\u30FC\u306E\u307F\u5B9F\u884C\u3092\u3002\u65E2\u306B\u540C\u76DF\u304C\u3042\u308B\u306A\u3089\u623B\u3063\u3066\u62DB\u5F85\u30EA\u30F3\u30AF\u3067\u53C2\u52A0\u3092\u3002", ko: "\uC644\uC804\uD788 \uC0C8 \uC5F0\uD569\uC744 \uB9CC\uB4ED\uB2C8\uB2E4. \uB9AC\uB354\uB9CC \uD558\uC138\uC694. \uC5F0\uD569\uC774 \uC774\uBBF8 \uC788\uC73C\uBA74 \uB4A4\uB85C \uAC00\uC11C \uCD08\uB300 \uB9C1\uD06C\uB85C \uCC38\uAC00\uD558\uC138\uC694.", id: "Ini membuat aliansi baru. Lakukan hanya jika kamu pemimpin. Jika aliansi sudah ada, kembali dan Gabung lewat tautannya.", vi: "Vi\u1EC7c n\xE0y t\u1EA1o m\u1ED9t li\xEAn minh m\u1EDBi. Ch\u1EC9 l\xE0m n\u1EBFu b\u1EA1n l\xE0 th\u1EE7 l\u0129nh. N\u1EBFu li\xEAn minh \u0111\xE3 c\xF3, quay l\u1EA1i v\xE0 Tham gia b\u1EB1ng link m\u1EDDi.", th: "\u0E19\u0E35\u0E48\u0E08\u0E30\u0E2A\u0E23\u0E49\u0E32\u0E07\u0E1E\u0E31\u0E19\u0E18\u0E21\u0E34\u0E15\u0E23\u0E43\u0E2B\u0E21\u0E48\u0E17\u0E31\u0E49\u0E07\u0E2B\u0E21\u0E14 \u0E17\u0E33\u0E40\u0E09\u0E1E\u0E32\u0E30\u0E16\u0E49\u0E32\u0E04\u0E38\u0E13\u0E40\u0E1B\u0E47\u0E19\u0E1C\u0E39\u0E49\u0E19\u0E33 \u0E16\u0E49\u0E32\u0E1E\u0E31\u0E19\u0E18\u0E21\u0E34\u0E15\u0E23\u0E21\u0E35\u0E2D\u0E22\u0E39\u0E48\u0E41\u0E25\u0E49\u0E27 \u0E43\u0E2B\u0E49\u0E22\u0E49\u0E2D\u0E19\u0E01\u0E25\u0E31\u0E1A\u0E41\u0E25\u0E30\u0E40\u0E02\u0E49\u0E32\u0E23\u0E48\u0E27\u0E21\u0E14\u0E49\u0E27\u0E22\u0E25\u0E34\u0E07\u0E01\u0E4C\u0E40\u0E0A\u0E34\u0E0D" },
    "create.doneTitle": { en: "Alliance created!", es: "\xA1Alianza creada!", pt: "Alian\xE7a criada!", fr: "Alliance cr\xE9\xE9e !", de: "Allianz erstellt!", it: "Alleanza creata!", nl: "Alliantie aangemaakt!", ru: "\u0410\u043B\u044C\u044F\u043D\u0441 \u0441\u043E\u0437\u0434\u0430\u043D!", pl: "Sojusz utworzony!", tr: "\u0130ttifak kuruldu!", ar: "\u062A\u0645 \u0625\u0646\u0634\u0627\u0621 \u0627\u0644\u062A\u062D\u0627\u0644\u0641!", he: "\u05D4\u05D1\u05E8\u05D9\u05EA \u05E0\u05D5\u05E6\u05E8\u05D4!", zh: "\u8054\u76DF\u5DF2\u521B\u5EFA\uFF01", ja: "\u540C\u76DF\u3092\u4F5C\u6210\u3057\u307E\u3057\u305F\uFF01", ko: "\uC5F0\uD569 \uC0DD\uC131 \uC644\uB8CC!", id: "Aliansi dibuat!", vi: "\u0110\xE3 t\u1EA1o li\xEAn minh!", th: "\u0E2A\u0E23\u0E49\u0E32\u0E07\u0E1E\u0E31\u0E19\u0E18\u0E21\u0E34\u0E15\u0E23\u0E41\u0E25\u0E49\u0E27!" },
    "create.doneDesc": { en: "Share this invite link with your alliance so everyone joins the same one. (Post it in your Discord or in-game mail.)", es: "Comparte este enlace con tu alianza para que todos entren a la misma. (En Discord o correo del juego.)", pt: "Compartilhe este link com sua alian\xE7a para todos entrarem na mesma. (No Discord ou correio do jogo.)", fr: "Partage ce lien avec ton alliance pour que tous rejoignent la m\xEAme. (Sur Discord ou le courrier en jeu.)", de: "Teile diesen Link mit deiner Allianz, damit alle derselben beitreten. (In Discord oder Spielpost.)", it: "Condividi questo link con la tua alleanza cos\xEC tutti entrano nella stessa. (Su Discord o posta di gioco.)", nl: "Deel deze link met je alliantie zodat iedereen dezelfde joint. (In Discord of in-game post.)", ru: "\u041F\u043E\u0434\u0435\u043B\u0438\u0442\u0435\u0441\u044C \u044D\u0442\u043E\u0439 \u0441\u0441\u044B\u043B\u043A\u043E\u0439 \u0441 \u0430\u043B\u044C\u044F\u043D\u0441\u043E\u043C, \u0447\u0442\u043E\u0431\u044B \u0432\u0441\u0435 \u0432\u043E\u0448\u043B\u0438 \u0432 \u043E\u0434\u0438\u043D. (\u0412 Discord \u0438\u043B\u0438 \u0438\u0433\u0440\u043E\u0432\u043E\u0439 \u043F\u043E\u0447\u0442\u0435.)", pl: "Udost\u0119pnij ten link sojuszowi, aby wszyscy do\u0142\u0105czyli do tego samego. (Na Discordzie lub poczcie w grze.)", tr: "Bu ba\u011Flant\u0131y\u0131 ittifak\u0131nla payla\u015F ki herkes ayn\u0131s\u0131na kat\u0131ls\u0131n. (Discord ya da oyun postas\u0131.)", ar: "\u0634\u0627\u0631\u0643 \u0631\u0627\u0628\u0637 \u0627\u0644\u062F\u0639\u0648\u0629 \u0645\u0639 \u062A\u062D\u0627\u0644\u0641\u0643 \u0644\u064A\u0646\u0636\u0645 \u0627\u0644\u062C\u0645\u064A\u0639 \u0644\u0646\u0641\u0633 \u0627\u0644\u062A\u062D\u0627\u0644\u0641. (\u0641\u064A Discord \u0623\u0648 \u0628\u0631\u064A\u062F \u0627\u0644\u0644\u0639\u0628\u0629.)", he: "\u05E9\u05EA\u05E3 \u05D0\u05EA \u05E7\u05D9\u05E9\u05D5\u05E8 \u05D4\u05D4\u05D6\u05DE\u05E0\u05D4 \u05E2\u05DD \u05D4\u05D1\u05E8\u05D9\u05EA \u05DB\u05D3\u05D9 \u05E9\u05DB\u05D5\u05DC\u05DD \u05D9\u05E6\u05D8\u05E8\u05E4\u05D5 \u05DC\u05D0\u05D5\u05EA\u05D4 \u05D0\u05D7\u05EA. (\u05D1\u05D3\u05D9\u05E1\u05E7\u05D5\u05E8\u05D3 \u05D0\u05D5 \u05D1\u05D3\u05D5\u05D0\u05E8 \u05D4\u05DE\u05E9\u05D7\u05E7.)", zh: "\u628A\u8FD9\u4E2A\u9080\u8BF7\u94FE\u63A5\u5206\u4EAB\u7ED9\u8054\u76DF\uFF0C\u8BA9\u5927\u5BB6\u52A0\u5165\u540C\u4E00\u4E2A\u3002\uFF08\u53D1\u5230 Discord \u6216\u6E38\u620F\u90AE\u4EF6\u3002\uFF09", ja: "\u3053\u306E\u62DB\u5F85\u30EA\u30F3\u30AF\u3092\u540C\u76DF\u3067\u5171\u6709\u3057\u3001\u5168\u54E1\u304C\u540C\u3058\u540C\u76DF\u306B\u53C2\u52A0\u3067\u304D\u308B\u3088\u3046\u306B\u3002\uFF08Discord\u3084\u30B2\u30FC\u30E0\u5185\u30E1\u30FC\u30EB\u3067\u3002\uFF09", ko: "\uC774 \uCD08\uB300 \uB9C1\uD06C\uB97C \uC5F0\uD569\uC5D0 \uACF5\uC720\uD574 \uBAA8\uB450 \uAC19\uC740 \uACF3\uC5D0 \uCC38\uAC00\uD558\uAC8C \uD558\uC138\uC694. (\uB514\uC2A4\uCF54\uB4DC\uB098 \uAC8C\uC784 \uC6B0\uD3B8\uC73C\uB85C.)", id: "Bagikan tautan undangan ini ke aliansi agar semua gabung yang sama. (Di Discord atau surat game.)", vi: "Chia s\u1EBB link m\u1EDDi n\xE0y cho li\xEAn minh \u0111\u1EC3 m\u1ECDi ng\u01B0\u1EDDi v\xE0o c\xF9ng m\u1ED9t. (Tr\xEAn Discord ho\u1EB7c th\u01B0 trong game.)", th: "\u0E41\u0E0A\u0E23\u0E4C\u0E25\u0E34\u0E07\u0E01\u0E4C\u0E40\u0E0A\u0E34\u0E0D\u0E19\u0E35\u0E49\u0E43\u0E2B\u0E49\u0E1E\u0E31\u0E19\u0E18\u0E21\u0E34\u0E15\u0E23\u0E40\u0E1E\u0E37\u0E48\u0E2D\u0E43\u0E2B\u0E49\u0E17\u0E38\u0E01\u0E04\u0E19\u0E40\u0E02\u0E49\u0E32\u0E2D\u0E31\u0E19\u0E40\u0E14\u0E35\u0E22\u0E27\u0E01\u0E31\u0E19 (\u0E42\u0E1E\u0E2A\u0E15\u0E4C\u0E43\u0E19 Discord \u0E2B\u0E23\u0E37\u0E2D\u0E40\u0E21\u0E25\u0E43\u0E19\u0E40\u0E01\u0E21)" },
    "create.dismiss": { en: "Done", es: "Listo", pt: "Pronto", fr: "OK", de: "Fertig", it: "Fatto", nl: "Klaar", ru: "\u0413\u043E\u0442\u043E\u0432\u043E", pl: "Gotowe", tr: "Tamam", ar: "\u062A\u0645", he: "\u05E1\u05D9\u05D5\u05DD", zh: "\u5B8C\u6210", ja: "\u5B8C\u4E86", ko: "\uC644\uB8CC", id: "Selesai", vi: "Xong", th: "\u0E40\u0E2A\u0E23\u0E47\u0E08" },
    "reset.confirm": { en: "Reset this account? This erases your gear, heroes, resources and alliance setup on this device, and removes you from the alliance roster. Your alt account and the rest of the alliance are not affected.", es: "\xBFRestablecer esta cuenta? Borra tu equipo, h\xE9roes, recursos y configuraci\xF3n de alianza en este dispositivo, y te quita del plantel. Tu cuenta alt y el resto de la alianza no se ven afectados.", pt: "Redefinir esta conta? Apaga seu equipamento, her\xF3is, recursos e configura\xE7\xE3o de alian\xE7a neste aparelho, e remove voc\xEA do elenco. Sua conta alt e o resto da alian\xE7a n\xE3o s\xE3o afetados.", fr: "R\xE9initialiser ce compte ? Cela efface ton \xE9quipement, h\xE9ros, ressources et config d\u2019alliance sur cet appareil, et te retire de l\u2019effectif. Ton compte alt et le reste de l\u2019alliance ne sont pas affect\xE9s.", de: "Dieses Konto zur\xFCcksetzen? L\xF6scht Ausr\xFCstung, Helden, Ressourcen und Allianz-Setup auf diesem Ger\xE4t und entfernt dich aus dem Kader. Dein Zweitkonto und der Rest der Allianz bleiben unber\xFChrt.", it: "Reimpostare questo account? Cancella equipaggiamento, eroi, risorse e configurazione alleanza su questo dispositivo, e ti rimuove dal roster. L\u2019account alt e il resto dell\u2019alleanza non sono toccati.", nl: "Dit account resetten? Wist je uitrusting, helden, resources en alliantie-instellingen op dit apparaat, en verwijdert je uit het rooster. Je alt-account en de rest van de alliantie blijven ongemoeid.", ru: "\u0421\u0431\u0440\u043E\u0441\u0438\u0442\u044C \u044D\u0442\u043E\u0442 \u0430\u043A\u043A\u0430\u0443\u043D\u0442? \u0423\u0434\u0430\u043B\u044F\u0435\u0442 \u0441\u043D\u0430\u0440\u044F\u0436\u0435\u043D\u0438\u0435, \u0433\u0435\u0440\u043E\u0435\u0432, \u0440\u0435\u0441\u0443\u0440\u0441\u044B \u0438 \u043D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0443 \u0430\u043B\u044C\u044F\u043D\u0441\u0430 \u043D\u0430 \u044D\u0442\u043E\u043C \u0443\u0441\u0442\u0440\u043E\u0439\u0441\u0442\u0432\u0435 \u0438 \u0443\u0431\u0438\u0440\u0430\u0435\u0442 \u0432\u0430\u0441 \u0438\u0437 \u0441\u043E\u0441\u0442\u0430\u0432\u0430. \u0410\u043B\u044C\u0442-\u0430\u043A\u043A\u0430\u0443\u043D\u0442 \u0438 \u043E\u0441\u0442\u0430\u043B\u044C\u043D\u043E\u0439 \u0430\u043B\u044C\u044F\u043D\u0441 \u043D\u0435 \u0437\u0430\u0442\u0440\u0430\u0433\u0438\u0432\u0430\u044E\u0442\u0441\u044F.", pl: "Zresetowa\u0107 to konto? Usuwa sprz\u0119t, bohater\xF3w, zasoby i konfiguracj\u0119 sojuszu na tym urz\u0105dzeniu oraz usuwa Ci\u0119 ze sk\u0142adu. Konto alt i reszta sojuszu pozostaj\u0105 nietkni\u0119te.", tr: "Bu hesap s\u0131f\u0131rlans\u0131n m\u0131? Bu cihazdaki ekipman, kahraman, kaynak ve ittifak kurulumunu siler ve seni kadrodan \xE7\u0131kar\u0131r. Alt hesab\u0131n ve ittifak\u0131n geri kalan\u0131 etkilenmez.", ar: "\u0625\u0639\u0627\u062F\u0629 \u062A\u0639\u064A\u064A\u0646 \u0647\u0630\u0627 \u0627\u0644\u062D\u0633\u0627\u0628\u061F \u064A\u0645\u0633\u062D \u0639\u062A\u0627\u062F\u0643 \u0648\u0623\u0628\u0637\u0627\u0644\u0643 \u0648\u0645\u0648\u0627\u0631\u062F\u0643 \u0648\u0625\u0639\u062F\u0627\u062F \u0627\u0644\u062A\u062D\u0627\u0644\u0641 \u0639\u0644\u0649 \u0647\u0630\u0627 \u0627\u0644\u062C\u0647\u0627\u0632\u060C \u0648\u064A\u0632\u064A\u0644\u0643 \u0645\u0646 \u0627\u0644\u0642\u0627\u0626\u0645\u0629. \u062D\u0633\u0627\u0628\u0643 \u0627\u0644\u0628\u062F\u064A\u0644 \u0648\u0628\u0642\u064A\u0629 \u0627\u0644\u062A\u062D\u0627\u0644\u0641 \u0644\u0627 \u064A\u062A\u0623\u062B\u0631\u0627\u0646.", he: "\u05DC\u05D0\u05E4\u05E1 \u05D0\u05EA \u05D4\u05D7\u05E9\u05D1\u05D5\u05DF \u05D4\u05D6\u05D4? \u05D6\u05D4 \u05DE\u05D5\u05D7\u05E7 \u05D0\u05EA \u05D4\u05E6\u05D9\u05D5\u05D3, \u05D4\u05D2\u05D9\u05D1\u05D5\u05E8\u05D9\u05DD, \u05D4\u05DE\u05E9\u05D0\u05D1\u05D9\u05DD \u05D5\u05D4\u05D2\u05D3\u05E8\u05EA \u05D4\u05D1\u05E8\u05D9\u05EA \u05D1\u05DE\u05DB\u05E9\u05D9\u05E8 \u05D4\u05D6\u05D4, \u05D5\u05DE\u05E1\u05D9\u05E8 \u05D0\u05D5\u05EA\u05DA \u05DE\u05D4\u05DE\u05E6\u05D1\u05EA. \u05D4\u05D7\u05E9\u05D1\u05D5\u05DF \u05D4\u05DE\u05E9\u05E0\u05D9 \u05D5\u05E9\u05D0\u05E8 \u05D4\u05D1\u05E8\u05D9\u05EA \u05D0\u05D9\u05E0\u05DD \u05DE\u05D5\u05E9\u05E4\u05E2\u05D9\u05DD.", zh: "\u91CD\u7F6E\u6B64\u8D26\u53F7\uFF1F\u5C06\u6E05\u9664\u672C\u8BBE\u5907\u4E0A\u7684\u88C5\u5907\u3001\u82F1\u96C4\u3001\u8D44\u6E90\u548C\u8054\u76DF\u8BBE\u7F6E\uFF0C\u5E76\u628A\u4F60\u79FB\u51FA\u540D\u518C\u3002\u4F60\u7684\u5C0F\u53F7\u548C\u8054\u76DF\u5176\u4ED6\u4EBA\u4E0D\u53D7\u5F71\u54CD\u3002", ja: "\u3053\u306E\u30A2\u30AB\u30A6\u30F3\u30C8\u3092\u30EA\u30BB\u30C3\u30C8\uFF1F\u3053\u306E\u7AEF\u672B\u306E\u88C5\u5099\u30FB\u30D2\u30FC\u30ED\u30FC\u30FB\u8CC7\u6E90\u30FB\u540C\u76DF\u8A2D\u5B9A\u3092\u6D88\u53BB\u3057\u3001\u30ED\u30B9\u30BF\u30FC\u304B\u3089\u5916\u3057\u307E\u3059\u3002\u30B5\u30D6\u57A2\u3068\u540C\u76DF\u306E\u4ED6\u306E\u30E1\u30F3\u30D0\u30FC\u306B\u306F\u5F71\u97FF\u3057\u307E\u305B\u3093\u3002", ko: "\uC774 \uACC4\uC815\uC744 \uCD08\uAE30\uD654\uD560\uAE4C\uC694? \uC774 \uAE30\uAE30\uC758 \uC7A5\uBE44\xB7\uC601\uC6C5\xB7\uC790\uC6D0\xB7\uC5F0\uD569 \uC124\uC815\uC744 \uC9C0\uC6B0\uACE0 \uB85C\uC2A4\uD130\uC5D0\uC11C \uC81C\uAC70\uD569\uB2C8\uB2E4. \uBD80\uCE90\uC640 \uC5F0\uD569\uC758 \uB098\uBA38\uC9C0\uB294 \uC601\uD5A5\uBC1B\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.", id: "Reset akun ini? Menghapus gear, hero, sumber daya, dan pengaturan aliansi di perangkat ini, serta mengeluarkanmu dari daftar. Akun alt dan aliansi lainnya tidak terpengaruh.", vi: "\u0110\u1EB7t l\u1EA1i t\xE0i kho\u1EA3n n\xE0y? X\xF3a trang b\u1ECB, t\u01B0\u1EDBng, t\xE0i nguy\xEAn v\xE0 thi\u1EBFt l\u1EADp li\xEAn minh tr\xEAn thi\u1EBFt b\u1ECB n\xE0y, v\xE0 g\u1EE1 b\u1EA1n kh\u1ECFi danh s\xE1ch. T\xE0i kho\u1EA3n ph\u1EE5 v\xE0 ph\u1EA7n c\xF2n l\u1EA1i c\u1EE7a li\xEAn minh kh\xF4ng b\u1ECB \u1EA3nh h\u01B0\u1EDFng.", th: "\u0E23\u0E35\u0E40\u0E0B\u0E47\u0E15\u0E1A\u0E31\u0E0D\u0E0A\u0E35\u0E19\u0E35\u0E49? \u0E08\u0E30\u0E25\u0E1A\u0E2D\u0E38\u0E1B\u0E01\u0E23\u0E13\u0E4C \u0E2E\u0E35\u0E42\u0E23\u0E48 \u0E17\u0E23\u0E31\u0E1E\u0E22\u0E32\u0E01\u0E23 \u0E41\u0E25\u0E30\u0E01\u0E32\u0E23\u0E15\u0E31\u0E49\u0E07\u0E04\u0E48\u0E32\u0E1E\u0E31\u0E19\u0E18\u0E21\u0E34\u0E15\u0E23\u0E1A\u0E19\u0E40\u0E04\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E19\u0E35\u0E49 \u0E41\u0E25\u0E30\u0E19\u0E33\u0E04\u0E38\u0E13\u0E2D\u0E2D\u0E01\u0E08\u0E32\u0E01\u0E23\u0E32\u0E22\u0E0A\u0E37\u0E48\u0E2D \u0E1A\u0E31\u0E0D\u0E0A\u0E35\u0E23\u0E2D\u0E07\u0E41\u0E25\u0E30\u0E2A\u0E21\u0E32\u0E0A\u0E34\u0E01\u0E1E\u0E31\u0E19\u0E18\u0E21\u0E34\u0E15\u0E23\u0E17\u0E35\u0E48\u0E40\u0E2B\u0E25\u0E37\u0E2D\u0E44\u0E21\u0E48\u0E44\u0E14\u0E49\u0E23\u0E31\u0E1A\u0E1C\u0E25\u0E01\u0E23\u0E30\u0E17\u0E1A" },
    "roster.changeSetup": { en: "Change alliance setup", es: "Cambiar configuraci\xF3n", pt: "Alterar configura\xE7\xE3o", fr: "Modifier la configuration", de: "Allianz-Setup \xE4ndern", it: "Cambia configurazione", nl: "Setup wijzigen", ru: "\u0418\u0437\u043C\u0435\u043D\u0438\u0442\u044C \u043D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0443", pl: "Zmie\u0144 konfiguracj\u0119", tr: "Kurulumu de\u011Fi\u015Ftir", ar: "\u062A\u063A\u064A\u064A\u0631 \u0627\u0644\u0625\u0639\u062F\u0627\u062F", he: "\u05E9\u05E0\u05D4 \u05D4\u05D2\u05D3\u05E8\u05EA \u05D1\u05E8\u05D9\u05EA", zh: "\u66F4\u6539\u8054\u76DF\u8BBE\u7F6E", ja: "\u540C\u76DF\u8A2D\u5B9A\u3092\u5909\u66F4", ko: "\uC5F0\uD569 \uC124\uC815 \uBCC0\uACBD", id: "Ubah pengaturan", vi: "\u0110\u1ED5i thi\u1EBFt l\u1EADp", th: "\u0E40\u0E1B\u0E25\u0E35\u0E48\u0E22\u0E19\u0E01\u0E32\u0E23\u0E15\u0E31\u0E49\u0E07\u0E04\u0E48\u0E32" },
    "roster.viewing": { en: "Viewing alliance", es: "Viendo alianza", pt: "Vendo alian\xE7a", fr: "Alliance affich\xE9e", de: "Anzeige", it: "Stai vedendo", nl: "Bekijkt", ru: "\u041F\u0440\u043E\u0441\u043C\u043E\u0442\u0440", pl: "Podgl\u0105d", tr: "G\xF6r\xFCnt\xFClenen", ar: "\u0627\u0644\u0639\u0631\u0636", he: "\u05E6\u05E4\u05D9\u05D9\u05D4 \u05D1\u05D1\u05E8\u05D9\u05EA", zh: "\u67E5\u770B\u8054\u76DF", ja: "\u8868\u793A\u4E2D\u306E\u540C\u76DF", ko: "\uBCF4\uB294 \uC5F0\uD569", id: "Melihat aliansi", vi: "\u0110ang xem", th: "\u0E01\u0E33\u0E25\u0E31\u0E07\u0E14\u0E39" },

    "roster.memberNote": { en: "Your progress is shared with your leader, who manages the alliance roster.", es: "Tu progreso se comparte con tu l\xEDder, que gestiona el plantel.", pt: "Seu progresso \xE9 compartilhado com seu l\xEDder, que gerencia o elenco.", fr: "Ta progression est partag\xE9e avec ton chef, qui g\xE8re l\u2019effectif.", de: "Dein Fortschritt wird mit deinem Leiter geteilt, der den Kader verwaltet.", it: "I tuoi progressi sono condivisi col leader, che gestisce il roster.", nl: "Je voortgang wordt gedeeld met je leider, die het rooster beheert.", ru: "\u0412\u0430\u0448 \u043F\u0440\u043E\u0433\u0440\u0435\u0441\u0441 \u0432\u0438\u0434\u0435\u043D \u043B\u0438\u0434\u0435\u0440\u0443, \u043A\u043E\u0442\u043E\u0440\u044B\u0439 \u0432\u0435\u0434\u0451\u0442 \u0441\u043E\u0441\u0442\u0430\u0432.", pl: "Tw\xF3j post\u0119p widzi lider zarz\u0105dzaj\u0105cy sk\u0142adem.", tr: "\u0130lerlemen kadroyu y\xF6neten liderinle payla\u015F\u0131l\u0131r.", ar: "\u064A\u064F\u0634\u0627\u0631\u064E\u0643 \u062A\u0642\u062F\u0645\u0643 \u0645\u0639 \u0642\u0627\u0626\u062F\u0643 \u0627\u0644\u0630\u064A \u064A\u062F\u064A\u0631 \u0627\u0644\u0642\u0627\u0626\u0645\u0629.", he: "\u05D4\u05D4\u05EA\u05E7\u05D3\u05DE\u05D5\u05EA \u05E9\u05DC\u05DA \u05DE\u05E9\u05D5\u05EA\u05E4\u05EA \u05E2\u05DD \u05D4\u05DE\u05E0\u05D4\u05D9\u05D2 \u05E9\u05DE\u05E0\u05D4\u05DC \u05D0\u05EA \u05D4\u05DE\u05E6\u05D1\u05EA.", zh: "\u4F60\u7684\u8FDB\u5EA6\u4F1A\u5206\u4EAB\u7ED9\u7BA1\u7406\u540D\u518C\u7684\u961F\u957F\u3002", ja: "\u9032\u6357\u306F\u540D\u7C3F\u3092\u7BA1\u7406\u3059\u308B\u30EA\u30FC\u30C0\u30FC\u306B\u5171\u6709\u3055\u308C\u307E\u3059\u3002", ko: "\uC9C4\uD589\uB3C4\uB294 \uB85C\uC2A4\uD130\uB97C \uAD00\uB9AC\uD558\uB294 \uB9AC\uB354\uC5D0\uAC8C \uACF5\uC720\uB429\uB2C8\uB2E4.", id: "Progresmu dibagikan ke pemimpin yang mengelola daftar.", vi: "Ti\u1EBFn \u0111\u1ED9 c\u1EE7a b\u1EA1n \u0111\u01B0\u1EE3c chia s\u1EBB v\u1EDBi th\u1EE7 l\u0129nh qu\u1E     "plan.desc": { en: "Below are your pending pieces for this phase, ordered so you can do the ones you can afford right now first.", es: "Abajo est\xE1n tus piezas pendientes de esta fase, ordenadas para que hagas primero las que ya puedes permitirte.", pt: "Abaixo est\xE3o suas pe\xE7as pendentes desta fase, ordenadas para fazer primeiro as que j\xE1 pode pagar.", fr: "Voici tes pi\xE8ces en attente pour cette phase, class\xE9es pour faire d\u2019abord celles que tu peux te permettre.", de: "Unten deine offenen Teile dieser Phase, sortiert, damit du zuerst das machst, was du dir leisten kannst.", it: "Qui sotto i pezzi in sospeso di questa fase, ordinati per fare prima quelli che puoi gi\xE0 permetterti.", nl: "Hieronder je openstaande stukken voor deze fase, gesorteerd zodat je eerst doet wat je nu kunt betalen.", ru: "\u041D\u0438\u0436\u0435 \u2014 \u043D\u0435\u0437\u0430\u0432\u0435\u0440\u0448\u0451\u043D\u043D\u044B\u0435 \u043F\u0440\u0435\u0434\u043C\u0435\u0442\u044B \u044D\u0442\u043E\u0439 \u0444\u0430\u0437\u044B, \u043E\u0442\u0441\u043E\u0440\u0442\u0438\u0440\u043E\u0432\u0430\u043D\u044B \u0442\u0430\u043A, \u0447\u0442\u043E\u0431\u044B \u0441\u043D\u0430\u0447\u0430\u043B\u0430 \u0434\u0435\u043B\u0430\u0442\u044C \u0434\u043E\u0441\u0442\u0443\u043F\u043D\u043E\u0435 \u0432\u0430\u043C \u0441\u0435\u0439\u0447\u0430\u0441.", pl: "Poni\u017Cej oczekuj\u0105ce elementy tej fazy, uszeregowane tak, by\u015B najpierw zrobi\u0142 to, na co ci\u0119 sta\u0107.", tr: "A\u015Fa\u011F\u0131da bu a\u015Faman\u0131n bekleyen par\xE7alar\u0131 var; \u015Fimdi kar\u015F\u0131layabileceklerini \xF6nce yapacak \u015Fekilde s\u0131raland\u0131.", ar: "\u0641\u064A \u0627\u0644\u0623\u0633\u0641\u0644 \u0642\u0637\u0639\u0643 \u0627\u0644\u0645\u0639\u0644\u0651\u0642\u0629 \u0644\u0647\u0630\u0647 \u0627\u0644\u0645\u0631\u062D\u0644\u0629\u060C \u0645\u0631\u062A\u0628\u0629 \u0644\u062A\u0628\u062F\u0623 \u0628\u0645\u0627 \u062A\u0642\u062F\u0631 \u0639\u0644\u064A\u0647 \u0627\u0644\u0622\u0646.", he: "\u05DC\u05DE\u05D8\u05D4 \u05D4\u05D7\u05DC\u05E7\u05D9\u05DD \u05E9\u05E0\u05D5\u05EA\u05E8\u05D5 \u05D1\u05E9\u05DC\u05D1 \u05D4\u05D6\u05D4, \u05DE\u05E1\u05D5\u05D3\u05E8\u05D9\u05DD \u05DB\u05DA \u05E9\u05EA\u05E2\u05E9\u05D4 \u05E7\u05D5\u05D3\u05DD \u05D0\u05EA \u05DE\u05D4 \u05E9\u05D0\u05EA\u05D4 \u05D9\u05DB\u05D5\u05DC \u05DC\u05D4\u05E8\u05E9\u05D5\u05EA \u05E2\u05DB\u05E9\u05D9\u05D5.", zh: "\u4EE5\u4E0B\u662F\u672C\u9636\u6BB5\u5F85\u529E\u7684\u88C5\u5907\uFF0C\u5DF2\u6392\u5E8F\uFF0C\u4FBF\u4E8E\u5148\u505A\u4F60\u73B0\u5728\u8D1F\u62C5\u5F97\u8D77\u7684\u3002", ja: "\u4EE5\u4E0B\u306F\u3053\u306E\u30D5\u30A7\u30FC\u30BA\u306E\u672A\u5B8C\u4E86\u306E\u88C5\u5099\u3067\u3059\u3002\u4ECA\u3059\u3050\u53EF\u80FD\u306A\u3082\u306E\u304B\u3089\u9806\u306B\u4E26\u3093\u3067\u3044\u307E\u3059\u3002", ko: "\uC544\uB798\uB294 \uC774 \uB2E8\uACC4\uC758 \uB0A8\uC740 \uC7A5\uBE44\uB85C, \uC9C0\uAE08 \uAC00\uB2A5\uD55C \uAC83\uBD80\uD130 \uD558\uB3C4\uB85D \uC815\uB82C\uD588\uC2B5\uB2C8\uB2E4.", id: "Berikut bagian yang tertunda di fase ini, diurut agar yang mampu kamu lakukan sekarang didahulukan.", vi: "D\u01B0\u1EDBi \u0111\xE2y l\xE0 c\xE1c m\xF3n c\xF2n l\u1EA1i c\u1EE7a giai \u0111o\u1EA1n n\xE0y, s\u1EAFp x\u1EBFp \u0111\u1EC3 b\u1EA1n l\xE0m tr\u01B0\u1EDBc nh\u1EEFng g\xEC \u0111\u1EE7 t\xE0i nguy\xEAn ngay.", th: "\u0E14\u0E49\u0E32\u0E19\u0E25\u0E48\u0E32\u0E07\u0E04\u0E37\u0E2D\u0E0A\u0E34\u0E49\u0E19\u0E17\u0E35\u0E48\u0E04\u0E49\u0E32\u0E07\u0E02\u0E2D\u0E07\u0E40\u0E1F\u0E2A\u0E19\u0E35\u0E49 \u0E40\u0E23\u0E35\u0E22\u0E07\u0E43\u0E2B\u0E49\u0E17\u0E33\u0E2A\u0E34\u0E48\u0E07\u0E17\u0E35\u0E48\u0E17\u0E33\u0E44\u0E14\u0E49\u0E15\u0E2D\u0E19\u0E19\u0E35\u0E49\u0E01\u0E48\u0E2D\u0E19" },

    "scan.optional": { en: "Scan gear from screenshots (optional)", es: "Escanear equipo desde capturas (opcional)", pt: "Escanear equipamento de capturas (opcional)", fr: "Scanner l\u2019\xE9quipement depuis des captures (optionnel)", de: "Ausr\xFCstung aus Screenshots scannen (optional)", it: "Scansiona equipaggiamento da screenshot (opzionale)", nl: "Uitrusting scannen vanaf screenshots (optioneel)", ru: "\u0421\u043A\u0430\u043D\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441\u043D\u0430\u0440\u044F\u0436\u0435\u043D\u0438\u0435 \u0441\u043E \u0441\u043A\u0440\u0438\u043D\u0448\u043E\u0442\u043E\u0432 (\u043D\u0435\u043E\u0431\u044F\u0437\u0430\u0442\u0435\u043B\u044C\u043D\u043E)", pl: "Skanuj sprz\u0119t ze zrzut\xF3w (opcjonalnie)", tr: "Ekipman\u0131 ekran g\xF6r\xFCnt\xFCs\xFCnden tara (iste\u011Fe ba\u011Fl\u0131)", ar: "\u0645\u0633\u062D \u0627\u0644\u0639\u062A\u0627\u062F \u0645\u0646 \u0644\u0642\u0637\u0627\u062A \u0627\u0644\u0634\u0627\u0634\u0629 (\u0627\u062E\u062A\u064A\u0627\u0631\u064A)", he: "\u05E1\u05E8\u05D5\u05E7 \u05E6\u05D9\u05D5\u05D3 \u05DE\u05E6\u05D9\u05DC\u05D5\u05DE\u05D9 \u05DE\u05E1\u05DA (\u05D0\u05D5\u05E4\u05E6\u05D9\u05D5\u05E0\u05DC\u05D9)", zh: "\u4ECE\u622A\u56FE\u626B\u63CF\u88C5\u5907\uFF08\u53EF\u9009\uFF09", ja: "\u30B9\u30AF\u30B7\u30E7\u304B\u3089\u88C5\u5099\u3092\u30B9\u30AD\u30E3\u30F3\uFF08\u4EFB\u610F\uFF09", ko: "\uC2A4\uD06C\uB9B0\uC0F7\uC5D0\uC11C \uC7A5\uBE44 \uC2A4\uCE94 (\uC120\uD0DD)", id: "Pindai gear dari tangkapan layar (opsional)", vi: "Qu\xE9t trang b\u1ECB t\u1EEB \u1EA3nh ch\u1EE5p (t\xF9y ch\u1ECDn)", th: "\u0E2A\u0E41\u0E01\u0E19\u0E2D\u0E38\u0E1B\u0E01\u0E23\u0E13\u0E4C\u0E08\u0E32\u0E01\u0E20\u0E32\u0E1E\u0E2B\u0E19\u0E49\u0E32\u0E08\u0E2D (\u0E44\u0E21\u0E48\u0E1A\u0E31\u0E07\u0E04\u0E31\u0E1A)" },
    "scan.notRecommended": { en: "Not the recommended way. A scan reads gear levels well, but often misreads rarity and hero names \u2014 entering gear by tapping the slots is more reliable. Use a scan as a quick start, then double-check.", es: "No es el m\xE9todo recomendado. El escaneo lee bien los niveles, pero suele equivocarse en rareza y h\xE9roes \u2014 tocar las ranuras es m\xE1s fiable. \xDAsalo como inicio r\xE1pido y revisa.", pt: "N\xE3o \xE9 o m\xE9todo recomendado. O scan l\xEA bem os n\xEDveis, mas costuma errar raridade e her\xF3is \u2014 tocar nos slots \xE9 mais confi\xE1vel. Use como in\xEDcio r\xE1pido e confira.", fr: "Pas la m\xE9thode recommand\xE9e. Le scan lit bien les niveaux mais se trompe souvent sur la raret\xE9 et les h\xE9ros \u2014 toucher les cases est plus fiable. Utilise-le comme point de d\xE9part, puis v\xE9rifie.", de: "Nicht die empfohlene Methode. Ein Scan liest Stufen gut, verwechselt aber oft Seltenheit und Helden \u2014 Felder antippen ist zuverl\xE4ssiger. Als Schnellstart nutzen, dann pr\xFCfen.", it: "Non \xE8 il metodo consigliato. La scansione legge bene i livelli, ma spesso sbaglia rarit\xE0 ed eroi \u2014 toccare gli slot \xE8 pi\xF9 affidabile. Usala come avvio rapido e verifica.", nl: "Niet de aanbevolen manier. Een scan leest niveaus goed, maar verwart vaak zeldzaamheid en helden \u2014 vakjes aantikken is betrouwbaarder. Gebruik als snelle start en controleer.", ru: "\u041D\u0435 \u0440\u0435\u043A\u043E\u043C\u0435\u043D\u0434\u0443\u0435\u043C\u044B\u0439 \u0441\u043F\u043E\u0441\u043E\u0431. \u0421\u043A\u0430\u043D \u0445\u043E\u0440\u043E\u0448\u043E \u0447\u0438\u0442\u0430\u0435\u0442 \u0443\u0440\u043E\u0432\u043D\u0438, \u043D\u043E \u0447\u0430\u0441\u0442\u043E \u043E\u0448\u0438\u0431\u0430\u0435\u0442\u0441\u044F \u0432 \u0440\u0435\u0434\u043A\u043E\u0441\u0442\u0438 \u0438 \u0433\u0435\u0440\u043E\u044F\u0445 \u2014 \u0432\u0432\u043E\u0434\u0438\u0442\u044C \u043F\u043E \u0441\u043B\u043E\u0442\u0430\u043C \u043D\u0430\u0434\u0451\u0436\u043D\u0435\u0435. \u0418\u0441\u043F\u043E\u043B\u044C\u0437\u0443\u0439\u0442\u0435 \u043A\u0430\u043A \u0431\u044B\u0441\u0442\u0440\u044B\u0439 \u0441\u0442\u0430\u0440\u0442 \u0438 \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435.", pl: "To nie zalecana metoda. Skan dobrze czyta poziomy, ale cz\u0119sto myli rzadko\u015B\u0107 i bohater\xF3w \u2014 dotykanie slot\xF3w jest pewniejsze. U\u017Cyj na szybki start i sprawd\u017A.", tr: "\xD6nerilen y\xF6ntem de\u011Fil. Tarama seviyeleri iyi okur ama nadirlik ve kahramanlar\u0131 s\u0131k kar\u0131\u015Ft\u0131r\u0131r \u2014 yuvalara dokunmak daha g\xFCvenilir. H\u0131zl\u0131 ba\u015Flang\u0131\xE7 i\xE7in kullan, sonra kontrol et.", ar: "\u0644\u064A\u0633\u062A \u0627\u0644\u0637\u0631\u064A\u0642\u0629 \u0627\u0644\u0645\u064F\u0648\u0635\u0649 \u0628\u0647\u0627. \u0627\u0644\u0645\u0633\u062D \u064A\u0642\u0631\u0623 \u0627\u0644\u0645\u0633\u062A\u0648\u064A\u0627\u062A \u062C\u064A\u062F\u064B\u0627 \u0644\u0643\u0646\u0647 \u064A\u062E\u0637\u0626 \u063A\u0627\u0644\u0628\u064B\u0627 \u0641\u064A \u0627\u0644\u0646\u062F\u0631\u0629 \u0648\u0627\u0644\u0623\u0628\u0637\u0627\u0644 \u2014 \u0625\u062F\u062E\u0627\u0644 \u0627\u0644\u0639\u062A\u0627\u062F \u0628\u0627\u0644\u0646\u0642\u0631 \u0623\u0643\u062B\u0631 \u0645\u0648\u062B\u0648\u0642\u064A\u0629. \u0627\u0633\u062A\u062E\u062F\u0645\u0647 \u0643\u0628\u062F\u0627\u064A\u0629 \u0633\u0631\u064A\u0639\u0629 \u062B\u0645 \u062A\u062D\u0642\u0642.", he: "\u05DC\u05D0 \u05D4\u05D3\u05E8\u05DA \u05D4\u05DE\u05D5\u05DE\u05DC\u05E6\u05EA. \u05D4\u05E1\u05E8\u05D9\u05E7\u05D4 \u05E7\u05D5\u05E8\u05D0\u05EA \u05E8\u05DE\u05D5\u05EA \u05D4\u05D9\u05D8\u05D1, \u05D0\u05DA \u05DC\u05E8\u05D5\u05D1 \u05D8\u05D5\u05E2\u05D4 \u05D1\u05E0\u05D3\u05D9\u05E8\u05D5\u05EA \u05D5\u05D1\u05D2\u05D9\u05D1\u05D5\u05E8\u05D9\u05DD \u2014 \u05D4\u05D6\u05E0\u05D4 \u05D9\u05D3\u05E0\u05D9\u05EA \u05D1\u05DC\u05D7\u05D9\u05E6\u05D4 \u05E2\u05DC \u05D4\u05DE\u05E9\u05D1\u05E6\u05D5\u05EA \u05D0\u05DE\u05D9\u05E0\u05D4 \u05D9\u05D5\u05EA\u05E8. \u05D4\u05E9\u05EA\u05DE\u05E9 \u05DC\u05D6\u05D9\u05E0\u05D5\u05E7 \u05DE\u05D4\u05D9\u05E8 \u05D5\u05D0\u05D6 \u05D1\u05D3\u05D5\u05E7.", zh: "\u4E0D\u662F\u63A8\u8350\u65B9\u5F0F\u3002\u626B\u63CF\u80FD\u8BFB\u51FA\u7B49\u7EA7\uFF0C\u4F46\u5E38\u8BEF\u5224\u7A00\u6709\u5EA6\u548C\u82F1\u96C4\u2014\u2014\u70B9\u51FB\u69FD\u4F4D\u8F93\u5165\u66F4\u53EF\u9760\u3002\u53EF\u4F5C\u5FEB\u901F\u8D77\u6B65\uFF0C\u4E4B\u540E\u6838\u5BF9\u3002", ja: "\u63A8\u5968\u3067\u306F\u3042\u308A\u307E\u305B\u3093\u3002\u30B9\u30AD\u30E3\u30F3\u306F\u30EC\u30D9\u30EB\u306F\u3088\u304F\u8AAD\u307F\u307E\u3059\u304C\u3001\u30EC\u30A2\u30EA\u30C6\u30A3\u3084\u30D2\u30FC\u30ED\u30FC\u3092\u8AA4\u8A8D\u3057\u304C\u3061 \u2014 \u67A0\u3092\u30BF\u30C3\u30D7\u3057\u3066\u5165\u529B\u3059\u308B\u65B9\u304C\u78BA\u5B9F\u3067\u3059\u3002\u624B\u65E9\u3044\u51FA\u767A\u70B9\u3068\u3057\u3066\u4F7F\u3044\u3001\u5F8C\u3067\u78BA\u8A8D\u3092\u3002", ko: "\uAD8C\uC7A5 \uBC29\uBC95\uC740 \uC544\uB2D9\uB2C8\uB2E4. \uC2A4\uCE94\uC740 \uB808\uBCA8\uC740 \uC798 \uC77D\uC9C0\uB9CC \uB4F1\uAE09\xB7\uC601\uC6C5\uC744 \uC790\uC8FC \uC798\uBABB \uC77D\uC2B5\uB2C8\uB2E4 \u2014 \uC2AC\uB86F\uC744 \uB20C\uB7EC \uC785\uB825\uD558\uB294 \uD3B8\uC774 \uB354 \uC815\uD655\uD569\uB2C8\uB2E4. \uBE60\uB978 \uC2DC\uC791\uC6A9\uC73C\uB85C \uC4F0\uACE0 \uD655\uC778\uD558\uC138\uC694.", id: "Bukan cara yang disarankan. Pindai membaca level dengan baik, tapi sering salah pada kelangkaan dan hero \u2014 mengetuk slot lebih andal. Pakai untuk awal cepat lalu periksa.", vi: "Kh\xF4ng ph\u1EA3i c\xE1ch khuy\u1EBFn ngh\u1ECB. Qu\xE9t \u0111\u1ECDc t\u1ED1t c\u1EA5p \u0111\u1ED9 nh\u01B0ng th\u01B0\u1EDDng nh\u1EA7m \u0111\u1ED9 hi\u1EBFm v\xE0 t\u01B0\u1EDBng \u2014 ch\u1EA1m \xF4 \u0111\u1EC3 nh\u1EADp \u0111\xE1ng tin h\u01A1n. D\xF9ng \u0111\u1EC3 kh\u1EDFi \u0111\u1EA7u nhanh r\u1ED3i ki\u1EC3m tra l\u1EA1i.", th: "\u0E44\u0E21\u0E48\u0E43\u0E0A\u0E48\u0E27\u0E34\u0E18\u0E35\u0E17\u0E35\u0E48\u0E41\u0E19\u0E30\u0E19\u0E33 \u0E01\u0E32\u0E23\u0E2A\u0E41\u0E01\u0E19\u0E2D\u0E48\u0E32\u0E19\u0E40\u0E25\u0E40\u0E27\u0E25\u0E44\u0E14\u0E49\u0E14\u0E35 \u0E41\u0E15\u0E48\u0E21\u0E31\u0E01\u0E2D\u0E48\u0E32\u0E19\u0E04\u0E27\u0E32\u0E21\u0E2B\u0E32\u0E22\u0E32\u0E01\u0E41\u0E25\u0E30\u0E2E\u0E35\u0E42\u0E23\u0E48\u0E1C\u0E34\u0E14 \u2014 \u0E41\u0E15\u0E30\u0E0A\u0E48\u0E2D\u0E07\u0E40\u0E1E\u0E37\u0E48\u0E2D\u0E01\u0E23\u0E2D\u0E01\u0E40\u0E2D\u0E07\u0E41\u0E21\u0E48\u0E19\u0E01\u0E27\u0E48\u0E32 \u0E43\u0E0A\u0E49\u0E40\u0E1B\u0E47\u0E19\u0E08\u0E38\u0E14\u0E40\u0E23\u0E34\u0E48\u0E21\u0E40\u0E23\u0E47\u0E27\u0E46 \u0E41\u0E25\u0E49\u0E27\u0E15\u0E23\u0E27\u0E08\u0E2A\u0E2D\u0E1A" },

    "phaseD.1": { en: "Build the top-priority Lethality pieces for all 3 troops to Red L20", es: "Lleva las piezas de Letalidad prioritarias de las 3 tropas a Rojo L20", pt: "Leve as pe\xE7as de Letalidade priorit\xE1rias das 3 tropas at\xE9 Vermelho L20", fr: "Monte les pi\xE8ces de L\xE9talit\xE9 prioritaires des 3 troupes \xE0 Rouge L20", de: "Bring die wichtigsten Letalit\xE4ts-Teile aller 3 Truppen auf Rot L20", it: "Porta i pezzi di Letalit\xE0 prioritari delle 3 truppe a Rosso L20", nl: "Breng de belangrijkste Letaliteitsstukken van alle 3 troepen naar Rood L20", ru: "\u0414\u043E\u0432\u0435\u0434\u0438\u0442\u0435 \u043F\u0440\u0438\u043E\u0440\u0438\u0442\u0435\u0442\u043D\u044B\u0435 \u043F\u0440\u0435\u0434\u043C\u0435\u0442\u044B \u043B\u0435\u0442\u0430\u043B\u044C\u043D\u043E\u0441\u0442\u0438 \u0432\u0441\u0435\u0445 3 \u0432\u043E\u0439\u0441\u043A \u0434\u043E \u041A\u0440\u0430\u0441\u043D\u044B\u0439 L20", pl: "Rozwi\u0144 priorytetowe cz\u0119\u015Bci \u015Amierciono\u015Bno\u015Bci wszystkich 3 wojsk do Czerwony L20", tr: "3 birli\u011Fin \xF6ncelikli \xD6l\xFCmc\xFCll\xFCk par\xE7alar\u0131n\u0131 K\u0131rm\u0131z\u0131 L20\u2019ye getir", ar: "\u0637\u0648\u0651\u0631 \u0642\u0637\u0639 \u0627\u0644\u0641\u062A\u0643 \u0630\u0627\u062A \u0627\u0644\u0623\u0648\u0644\u0648\u064A\u0629 \u0644\u0644\u0648\u062D\u062F\u0627\u062A \u0627\u0644\u062B\u0644\u0627\u062B \u0625\u0644\u0649 \u0623\u062D\u0645\u0631 L20", he: "\u05D1\u05E0\u05D4 \u05D0\u05EA \u05D7\u05DC\u05E7\u05D9 \u05D4\u05E7\u05D8\u05DC\u05E0\u05D9\u05D5\u05EA \u05D1\u05E2\u05D3\u05D9\u05E4\u05D5\u05EA \u05E2\u05DC\u05D9\u05D5\u05E0\u05D4 \u05DC\u05DB\u05DC 3 \u05D4\u05E1\u05D5\u05D2\u05D9\u05DD \u05E2\u05D3 \u05D0\u05D3\u05D5\u05DD L20", zh: "\u5C063\u4E2A\u5175\u79CD\u7684\u9AD8\u4F18\u5148\u6740\u4F24\u88C5\u5907\u5347\u81F3\u7EA2\u8272L20", ja: "3\u5175\u7A2E\u306E\u6700\u512A\u5148\u306E\u6BBA\u50B7\u88C5\u5099\u3092\u8D64L20\u307E\u3067", ko: "3\uAC1C \uBCD1\uC885\uC758 \uCD5C     "phaseD.2": { en: "Ascend the remaining 7 slots to Red gear.\nEach piece needs: Mythic Lv.100 + Mastery Lv.10 + 2 Mythic Gears.", es: "Asciende las 7 ranuras restantes a equipo Rojo.\nCada pieza necesita: M\xEDtico Lv.100 + Maestr\xEDa Lv.10 + 2 Engranajes M\xEDticos.", pt: "Ascenda os 7 slots restantes para equipamento Vermelho.\nCada pe\xE7a precisa: M\xEDtico Lv.100 + Maestria Lv.10 + 2 Engrenagens M\xEDticas.", fr: "Fais ascensionner les 7 emplacements restants en Rouge.\nChaque pi\xE8ce requiert : Mythique Niv.100 + Ma\xEEtrise Niv.10 + 2 Engrenages Mythiques.", de: "Lass die \xFCbrigen 7 Slots zu Rot aufsteigen.\nJedes Teil braucht: Mythisch Lv.100 + Meisterschaft Lv.10 + 2 Mythische Zahnr\xE4der.", it: "Ascendi i 7 slot rimanenti a equipaggiamento Rosso.\nOgni pezzo richiede: Mitico Liv.100 + Maestria Liv.10 + 2 Ingranaggi Mitici.", nl: "Ascend de overige 7 slots naar Rode uitrusting.\nElk stuk vereist: Mythisch Lv.100 + Meesterschap Lv.10 + 2 Mythische Tandwielen.", ru: "\u0412\u043E\u0437\u043D\u0435\u0441\u0438\u0442\u0435 \u043E\u0441\u0442\u0430\u0432\u0448\u0438\u0435\u0441\u044F 7 \u0441\u043B\u043E\u0442\u043E\u0432 \u0434\u043E \u041A\u0440\u0430\u0441\u043D\u043E\u0433\u043E \u0441\u043D\u0430\u0440\u044F\u0436\u0435\u043D\u0438\u044F.\n\u041A\u0430\u0436\u0434\u043E\u043C\u0443 \u043F\u0440\u0435\u0434\u043C\u0435\u0442\u0443 \u043D\u0443\u0436\u043D\u043E: \u041C\u0438\u0444\u0438\u043A \u0443\u0440.100 + \u041C\u0430\u0441\u0442\u0435\u0440\u0441\u0442\u0432\u043E \u0443\u0440.10 + 2 \u043C\u0438\u0444\u0438\u0447\u0435\u0441\u043A\u0438\u0435 \u0448\u0435\u0441\u0442\u0435\u0440\u043D\u0438.", pl: "Wznie\u015B pozosta\u0142e 7 slot\xF3w do Czerwonego sprz\u0119tu.\nKa\u017Cda cz\u0119\u015B\u0107 wymaga: Mityczny poz.100 + Mistrzostwo poz.10 + 2 Mityczne Ko\u0142a.", tr: "Kalan 7 yuvay\u0131 K\u0131rm\u0131z\u0131 ekipmana y\xFCkselt.\nHer par\xE7a i\xE7in: Efsanevi Sv.100 + Ustal\u0131k Sv.10 + 2 Efsanevi Di\u015Fli.", ar: "\u0627\u0631\u062A\u0642\u0650 \u0628\u0627\u0644\u062E\u0627\u0646\u0627\u062A \u0627\u0644\u06407 \u0627\u0644\u0645\u062A\u0628\u0642\u064A\u0629 \u0625\u0644\u0649 \u0639\u062A\u0627\u062F \u0623\u062D\u0645\u0631.\n\u0643\u0644 \u0642\u0637\u0639\u0629 \u062A\u062D\u062A\u0627\u062C: \u0623\u0633\u0637\u0648\u0631\u064A \u0645\u0633\u062A\u0648\u0649 100 + \u0625\u062A\u0642\u0627\u0646 \u0645\u0633\u062A\u0648\u0649 10 + 2 \u062A\u0631\u0648\u0633 \u0623\u0633\u0637\u0648\u0631\u064A\u0629.", he: "\u05D4\u05E2\u05DC\u05D4 \u05D0\u05EA 7 \u05D4\u05DE\u05E9\u05D1\u05E6\u05D5\u05EA \u05E9\u05E0\u05D5\u05EA\u05E8\u05D5 \u05DC\u05E6\u05D9\u05D5\u05D3 \u05D0\u05D3\u05D5\u05DD.\n\u05DB\u05DC \u05E4\u05E8\u05D9\u05D8 \u05D3\u05D5\u05E8\u05E9: \u05DE\u05D9\u05EA\u05D9 \u05E8\u05DE\u05D4 100 + \u05DE\u05D0\u05E1\u05D8\u05E8\u05D9 \u05E8\u05DE\u05D4 10 + 2 \u05D2\u05DC\u05D2\u05DC\u05D9 \u05DE\u05D9\u05EA\u05D5\u05E1.", zh: "\u5C06\u5269\u4F597\u4E2A\u69FD\u4F4D\u98DE\u5347\u4E3A\u7EA2\u8272\u88C5\u5907\u3002\n\u6BCF\u4EF6\u9700\u8981\uFF1A\u795E\u8BDDLv.100 + \u7CBE\u901ALv.10 + 2\u795E\u8BDD\u9F7F\u8F6E\u3002", ja: "\u6B8B\u308A7\u67A0\u3092\u8D64\u88C5\u5099\u306B\u30A2\u30BB\u30F3\u30C9\u3002\n\u5404\u90E8\u4F4D\u306B\u5FC5\u8981\uFF1A\u30DF\u30B7\u30C3\u30AFLv.100 + \u719F\u7DF4\u5EA6Lv.10 + \u795E\u8A71\u30AE\u30A22\u500B\u3002", ko: "\uB0A8\uC740 7\uAC1C \uC2AC\uB86F\uC744 \uB808\uB4DC \uC7A5\uBE44\uB85C \uC2B9\uAE09.\n\uAC01 \uC7A5\uBE44 \uD544\uC694: \uBBF8\uC2DD Lv.100 + \uC219\uB828 Lv.10 + \uC2E0\uD654 \uAE30\uC5B4 2\uAC1C.", id: "Naikkan 7 slot tersisa ke gear Merah.\nTiap bagian butuh: Mythic Lv.100 + Mastery Lv.10 + 2 Mythic Gears.", vi: "Th\u0103ng 7 \xF4 c\xF2n l\u1EA1i l\xEAn trang b\u1ECB \u0110\u1ECF.\nM\u1ED7i m\xF3n c\u1EA7n: Th\u1EA7n tho\u1EA1i Lv.100 + Tinh th\xF4ng Lv.10 + 2 Mythic Gears.", th: "\u0E2D\u0E31\u0E2A\u0E40\u0E0B\u0E19\u0E14\u0E4C 7 \u0E0A\u0E48\u0E2D\u0E07\u0E17\u0E35\u0E48\u0E40\u0E2B\u0E25\u0E37\u0E2D\u0E40\u0E1B\u0E47\u0E19\u0E40\u0E01\u0E35\u0E22\u0E23\u0E4C\u0E2A\u0E35\u0E41\u0E14\u0E07\n\u0E41\u0E15\u0E48\u0E25\u0E30\u0E0A\u0E34\u0E49\u0E19\u0E15\u0E49\u0E2D\u0E07\u0E01\u0E32\u0E23: \u0E21\u0E34\u0E18\u0E34\u0E01 Lv.100 + Mastery Lv.10 + Mythic Gears 2 \u0E0A\u0E34\u0E49\u0E19" },
    "phaseD.3": { en: "Continue building the Phase 1 pieces to Red L39", es: "Sigue subiendo las piezas de la Fase 1 a Rojo L39", pt: "Continue subindo as pe\xE7as da Fase 1 at\xE9 Vermelho L39", fr: "Continue de monter les pi\xE8ces de la Phase 1 \xE0 Rouge L39", de: "Bau die Teile aus Phase 1 weiter auf Rot L39", it: "Continua a portare i pezzi della Fase 1 a Rosso L39", nl: "Bouw de stukken uit Fase 1 verder naar Rood L39", ru: "\u041F\u0440\u043E\u0434\u043E\u043B\u0436\u0430\u0439\u0442\u0435 \u0440\u0430\u0437\u0432\u0438\u0432\u0430\u0442\u044C \u043F\u0440\u0435\u0434\u043C\u0435\u0442\u044B \u0424\u0430\u0437\u044B 1 \u0434\u043E \u041A\u0440\u0430\u0441\u043D\u044B\u0439 L39", pl: "Rozwijaj cz\u0119\u015Bci z Fazy 1 do Czerwony L39", tr: "A\u015Fama 1 par\xE7alar\u0131n\u0131 K\u0131rm\u0131z\u0131 L39\u2019a getirmeye devam et", ar: "\u0648\u0627\u0635\u0644 \u062A\u0637\u0648\u064A\u0631 \u0642\u0637\u0639 \u0627\u0644\u0645\u0631\u062D\u0644\u0629 1 \u0625\u0644\u0649 \u0623\u062D\u0645\u0631 L39", he: "\u05D4\u05DE\u05E9\u05DA \u05DC\u05D1\u05E0\u05D5\u05EA \u05D0\u05EA \u05D7\u05DC\u05E7\u05D9 \u05E9\u05DC\u05D1 1 \u05E2\u05D3 \u05D0\u05D3\u05D5\u05DD L39", zh: "\u7EE7\u7EED\u5C06\u7B2C1\u9636\u6BB5\u88C5\u5907\u5347\u81F3\u7EA2\u8272L39", ja: "\u30D5\u30A7\u30FC\u30BA1\u306E\u88C5\u5099\u3092\u8D64L39\u307E\u3067\u7D99\u7D9A", ko: "1\uB2E8\uACC4 \uC7A5\uBE44\uB97C \uB808\uB4DC L39\uAE4C\uC9C0 \uACC4\uC18D", id: "Lanjut naikkan gear Fase 1 ke Merah L39", vi: "Ti\u1EBFp t\u1EE5c n\xE2ng c\xE1c m\xF3n Giai \u0111o\u1EA1n 1 l\xEAn \u0110\u1ECF L39", th: "\u0E2D\u0E31\u0E1B\u0E40\u0E01\u0E23\u0E14\u0E0A\u0E34\u0E49\u0E19\u0E40\u0E1F\u0E2A 1 \u0E15\u0E48\u0E2D\u0E40\u0E1B\u0E47\u0E19\u0E41\u0E14\u0E07 L39" },
    "phaseD.4": { en: "Push 3 of your Red pieces (from Phase 2 ascensions) to Red L19", es: "Sube 3 de tus piezas Rojas (de las ascensiones de la Fase 2) a Rojo L19", pt: "Suba 3 das suas pe\xE7as Vermelhas (das ascens\xF5es da Fase 2) at\xE9 Vermelho L19", fr: "Monte 3 de tes pi\xE8ces Rouges (des ascensions de la Phase 2) \xE0 Rouge L19", de: "Bring 3 deiner Rot-Teile (aus Phase-2-Aufstiegen) auf Rot L19", it: "Porta 3 dei tuoi pezzi Rossi (dalle ascensioni della Fase 2) a Rosso L19", nl: "Breng 3 van je Rode stukken (uit Fase 2-ascensions) naar Rood L19", ru: "\u0414\u043E\u0432\u0435\u0434\u0438\u0442\u0435 3 \u0432\u0430\u0448\u0438\u0445 \u043A\u0440\u0430\u0441\u043D\u044B\u0445 \u043F\u0440\u0435\u0434\u043C\u0435\u0442\u0430 (\u0438\u0437 \u0432\u043E\u0437\u043D\u0435\u0441\u0435\u043D\u0438\u0439 \u0424\u0430\u0437\u044B 2) \u0434\u043E \u041A\u0440\u0430\u0441\u043D\u043E\u0433\u043E L19", pl: "Rozwi\u0144 3 swoje Czerwone cz\u0119\u015Bci (z wzniesie\u0144 Fazy 2) do Czerwony L19", tr: "K\u0131rm\u0131z\u0131 par\xE7alar\u0131ndan 3\u2019\xFCn\xFC (A\u015Fama 2 y\xFCkseltmelerinden) K\u0131rm\u0131z\u0131 L19\u2019a getir", ar: "\u0637\u0648\u0651\u0631 3 \u0645\u0646 \u0642\u0637\u0639\u0643 \u0627\u0644\u062D\u0645\u0631\u0627\u0621 (\u0645\u0646 \u0627\u0631\u062A\u0642\u0627\u0621\u0627\u062A \u0627\u0644\u0645\u0631\u062D\u0644\u0629 2) \u0625\u0644\u0649 \u0623\u062D\u0645\u0631 L19", he: "\u05D3\u05D7\u05D5\u05E3 3 \u05DE\u05D7\u05DC\u05E7\u05D9 \u05D4\u05D0\u05D3\u05D5\u05DD \u05E9\u05DC\u05DA (\u05DE\u05D4\u05E2\u05DC\u05D9\u05D5\u05EA \u05E9\u05DC \u05E9\u05DC\u05D1 2) \u05DC\u05D0\u05D3\u05D5\u05DD L19", zh: "\u5C063\u4EF6\u7EA2\u8272\u88C5\u5907\uFF08\u7B2C2\u9636\u6BB5\u98DE\u5347\u800C\u6765\uFF09\u5347\u81F3\u7EA2\u8272L19", ja: "\u30EC\u30C3\u30C9\u88C5\u50993\u3064\uFF08\u30D5\u30A7\u30FC\u30BA2\u306E\u30A2\u30BB\u30F3\u30C9\u5206\uFF09\u3092\u8D64L19\u307E\u3067", ko: "\uB808\uB4DC \uC7A5\uBE44 3\uAC1C(2\uB2E8\uACC4 \uC2B9\uAE09\uBD84)\uB97C \uB808\uB4DC L19\uAE4C\uC9C0", id: "Naikkan 3 gear Merah (dari ascend Fase 2) ke Merah L19", vi: "N\xE2ng 3 m\xF3n \u0110\u1ECF (t\u1EEB th\u0103ng c\u1EA5p Giai \u0111o\u1EA1n 2) l\xEAn \u0110\u1ECF L19", th: "\u0E14\u0E31\u0E19\u0E0A\u0E34\u0E49\u0E19\u0E2A\u0E35\u0E41\u0E14\u0E07 3 \u0E0A\u0E34\u0E49\u0E19 (\u0E08\u0E32\u0E01\u0E01\u0E32\u0E23\u0E2D\u0E31\u0E2A\u0E40\u0E0B\u0E19\u0E14\u0E4C\u0E40\u0E1F\u0E2A 2) \u0E40\u0E1B\u0E47\u0E19\u0E41\u0E14\u0E07 L19" },
    "phaseD.5": { en: "Push the other 4 Red pieces (Phase 2 ascensions) to Red L19-20", es: "Sube las otras 4 piezas Rojas (ascensiones de la Fase 2) a Rojo L19-20", pt: "Suba as outras 4 pe\xE7as Vermelhas (ascens\xF5es da Fase 2) at\xE9 Vermelho L19-20", fr: "Monte les 4 autres pi\xE8ces Rouges (ascensions de la Phase 2) \xE0 Rouge L19-20", de: "Bring die anderen 4 Rot-Teile (Phase-2-Aufstiege) auf Rot L19-20", it: "Porta gli altri 4 pezzi Rossi (ascensioni della Fase 2) a Rosso L19-20", nl: "Breng de andere 4 Rode stukken (Fase 2-ascensions) naar Rood L19-20", ru: "\u0414\u043E\u0432\u0435\u0434\u0438\u0442\u0435 \u043E\u0441\u0442\u0430\u043B\u044C\u043D\u044B\u0435 4 \u043A\u0440\u0430\u0441\u043D\u044B\u0445 \u043F\u0440\u0435\u0434\u043C\u0435\u0442\u0430 (\u0432\u043E\u0437\u043D\u0435\u0441\u0435\u043D\u0438\u044F \u0424\u0430\u0437\u044B 2) \u0434\u043E \u041A\u0440\u0430\u0441\u043D\u043E\u0433\u043E L19-20", pl: "Rozwi\u0144 pozosta\u0142e 4 Czerwone cz\u0119\u015Bci (wzniesienia Fazy 2) do Czerwony L19-20", tr: "Di\u011Fer 4 K\u0131rm\u0131z\u0131 par\xE7ay\u0131 (A\u015Fama 2 y\xFCkseltmeleri) K\u0131rm\u0131z\u0131 L19-20\u2019ye getir", ar: "\u0637\u0648\u0651\u0631 \u0627\u0644\u0642\u0637\u0639 \u0627\u0644\u062D\u0645\u0631\u0627\u0621 \u0627\u0644\u0623\u0631\u0628\u0639 \u0627\u0644\u0623\u062E\u0631\u0649 (\u0627\u0631\u062A\u0642\u0627\u0621\u0627\u062A \u0627\u0644\u0645\u0631\u062D\u0644\u0629 2) \u0625\u0644\u0649 \u0623\u062D\u0645\u0631 L19-20", he: "\u05D3\u05D7\u05D5\u05E3 \u05D0\u05EA 4 \u05D7\u05DC\u05E7\u05D9 \u05D4\u05D0\u05D3\u05D5\u05DD \u05D4\u05E0\u05D5\u05EA\u05E8\u05D9\u05DD (\u05E2\u05DC\u05D9\u05D5\u05EA \u05E9\u05DC\u05D1 2) \u05DC\u05D0\u05D3\u05D5\u05DD L19-20", zh: "\u5C06\u53E6\u59164\u4EF6\u7EA2\u8272\u88C5\u5907\uFF08\u7B2C2\u9636\u6BB5\u98DE\u5347\uFF09\u5347\u81F3\u7EA2\u8272L19-20", ja: "\u6B8B\u308A4\u3064\u306E\u30EC\u30C3\u30C9\u88C5\u5099\uFF08\u30D5\u30A7\u30FC\u30BA2\u30A2\u30BB\u30F3\u30C9\uFF09\u3092\u8D64L19-20\u307E\u3067", ko: "\uB098\uBA38\uC9C0 \uB808\uB4DC \uC7A5\uBE44 4\uAC1C(2\uB2E8\uACC4 \uC2B9\uAE09)\uB97C \uB808\uB4DC L19-20\uAE4C\uC9C0", id: "Naikkan 4 gear Merah lainnya (ascend Fase 2) ke Merah L19-20", vi: "N\xE2ng 4 m\xF3n \u0110\u1ECF c\xF2n l\u1EA1i (th\u0103ng c\u1EA5p Giai \u0111o\u1EA1n 2) l\xEAn \u0110\u1ECF L19-20", th: "\u0E14\u0E31\u0E19\u0E0A\u0E34\u0E49\u0E19\u0E2A\u0E35\u0E41\u0E14\u0E07\u0E2D\u0E35\u0E01 4 \u0E0A\u0E34\u0E49\u0E19 (\u0E2D\u0E31\u0E2A\u0E40\u0E0B\u0E19\u0E14\u0E4C\u0E40\u0E1F\u0E2A 2) \u0E40\u0E1B\u0E47\u0E19\u0E41\u0E14\u0E07 L19-20" },
    "phaseD.6": { en: "Ascend Archer & Cavalry Gloves to Red gear.\nEach piece needs: Mythic Lv.100 + Mastery Lv.10 + 2 Mythic Gears.", es: "Asciende los Guantes de Arquero y Caballer\xEDa a equipo Rojo.\nCada pieza necesita: M\xEDtico Lv.100 + Maestr\xEDa Lv.10 + 2 Engranajes M\xEDticos.", pt: "Ascenda as Luvas de Arqueiro e Cavalaria para Vermelho.\nCada pe\xE7a precisa: M\xEDtico Lv.100 + Maestria Lv.10 + 2 Engrenagens M\xEDticas.", fr: "Fais ascensionner les Gants d\u2019Archer et de Cavalerie en Rouge.\nChaque pi\xE8ce requiert : Mythique Niv.100 + Ma\xEEtrise Niv.10 + 2 Engrenages Mythiques.", de: "Lass Bogensch\xFCtzen- und Kavallerie-Handschuhe zu Rot aufsteigen.\nJedes Teil braucht: Mythisch Lv.100 + Meisterschaft Lv.10 + 2 Mythische Zahnr\xE4der.", it: "Ascendi i Guanti di Arciere e Cavalleria a Rosso.\nOgni pezzo richiede: Mitico Liv.100 + Maestria Liv.10 + 2 Ingranaggi Mitici.", nl: "Ascend de Handschoenen van Boogschutter en Cavalerie naar Rood.\nElk stuk vereist: Mythisch Lv.100 + Meesterschap Lv.10 + 2 Mythische Tandwielen.", ru: "\u0412\u043E\u0437\u043D\u0435\u0441\u0438\u0442\u0435 \u043F\u0435\u0440\u0447\u0430\u0442\u043A\u0438 \u041B\u0443\u0447\u043D\u0438\u043A\u0430 \u0438 \u041A\u0430\u0432\u0430\u043B\u0435\u0440\u0438\u0438 \u0434\u043E \u041A\u0440\u0430\u0441\u043D\u043E\u0433\u043E.\n\u041A\u0430\u0436\u0434\u043E\u043C\u0443 \u043F\u0440\u0435\u0434\u043C\u0435\u0442\u0443 \u043D\u0443\u0436\u043D\u043E: \u041C\u0438\u0444\u0438\u043A \u0443\u0440.100 + \u041C\u0430\u0441\u0442\u0435\u0440\u0441\u0442\u0432\u043E \u0443\u0440.10 + 2 \u043C\u0438\u0444\u0438\u0447\u0435\u0441\u043A\u0438\u0435 \u0448\u0435\u0441\u0442\u0435\u0440\u043D\u0438.", pl: "Wznie\u015B R\u0119kawice \u0141ucznika i Kawalerii do Czerwonego.\nKa\u017Cda cz\u0119\u015B\u0107 wymaga: Mityczny poz.100 + Mistrzostwo poz.10 + 2 Mityczne Ko\u0142a.", tr: "Ok\xE7u ve S\xFCvari Eldivenlerini K\u0131rm\u0131z\u0131ya y\xFCkselt.\nHer par\xE7a i\xE7in: Efsanevi Sv.100 + Ustal\u0131k Sv.10 + 2 Efsanevi Di\u015Fli.", ar: "\u0627\u0631\u062A\u0642\u0650 \u0628\u0642\u0641\u0627\u0632\u0627\u062A \u0627\u0644\u0631\u0627\u0645\u064A \u0648\u0627\u0644\u0641\u0631\u0633\u0627\u0646 \u0625\u0644\u0649 \u0627\u0644\u0623\u062D\u0645\u0631.\n\u0643\u0644 \u0642\u0637\u0639\u0629 \u062A\u062D\u062A\u0627\u062C: \u0623\u0633\u0637\u0648\u0631\u064A \u0645\u0633\u062A\u0648\u0649 100 + \u0625\u062A\u0642\u0627\u0646 \u0645\u0633\u062A\u0648\u0649 10 + 2 \u062A\u0631\u0648\u0633 \u0623\u0633\u0637\u0648\u0631\u064A\u0629.", he: "\u05D4\u05E2\u05DC\u05D4 \u05D0\u05EA \u05DB\u05E4\u05E4\u05D5\u05EA \u05D4\u05E7\u05E9\u05EA \u05D5\u05D4\u05E4\u05E8\u05E9\u05D9\u05DD \u05DC\u05D0\u05D3\u05D5\u05DD.\n\u05DB\u05DC \u05E4\u05E8\u05D9\u05D8 \u05D3\u05D5\u05E8\u05E9: \u05DE\u05D9\u05EA\u05D9 \u05E8\u05DE\u05D4 100 + \u05DE\u05D0\u05E1\u05D8\u05E8\u05D9 \u05E8\u05DE\u05D4 10 + 2 \u05D2\u05DC\u05D2\u05DC\u05D9 \u05DE\u05D9\u05EA\u05D5\u05E1.", zh: "\u5C06\u5F13\u5175\u548C\u9A91\u5175\u624B\u5957\u98DE\u5347\u4E3A\u7EA2\u8272\u3002\n\u6BCF\u4EF6\u9700\u8981\uFF1A\u795E\u8BDDLv.100 + \u7CBE\u901ALv.10 + 2\u795E\u8BDD\u9F7F\u8F6E\u3002", ja: "\u5F13\u5175\u3068\u9A0E\u5175\u306E\u624B\u888B\u3092\u8D64\u306B\u30A2\u30BB\u30F3\u30C9\u3002\n\u5404\u90E8\u4F4D\u306B\u5FC5\u8981\uFF1A\u30DF\u30B7\u30C3\u30AFLv.100 + \u719F\u7DF4\u5EA6Lv.10 + \u795E\u8A71\u30AE\u30A22\u500B\u3002", ko: "\uAD81\uC218\xB7\uAE30\uBCD1 \uC7A5\uAC11\uC744 \uB808\uB4DC\uB85C \uC2B9\uAE09.\n\uAC01 \uC7A5\uBE44 \uD544\uC694: \uBBF8\uC2DD Lv.100 + \uC219\uB828 Lv.10 + \uC2E0\uD654 \uAE30\uC5B4 2\uAC1C.", id: "Naikkan Sarung Tangan Pemanah & Kavaleri ke Merah.\nTiap bagian butuh: Mythic Lv.100 + Mastery Lv.10 + 2 Mythic Gears.", vi: "Th\u0103ng G\u0103ng tay Cung th\u1EE7 & K\u1EF5 binh l\xEAn \u0110\u1ECF.\nM\u1ED7i m\xF3n c\u1EA7n: Th\u1EA7n tho\u1EA1i Lv.100 + Tinh th\xF4ng Lv.10 + 2 Mythic Gears.", th: "\u0E2D\u0E31\u0E2A\u0E40\u0E0B\u0E19\u0E14\u0E4C\u0E16\u0E38\u0E07\u0E21\u0E37\u0E2D\u0E19\u0E31\u0E01\u0E18\u0E19\u0E39\u0E41\u0E25\u0E30\u0E17\u0E2B\u0E32\u0E23\u0E21\u0E49\u0E32\u0E40\u0E1B\u0E47\u0E19\u0E2A\u0E35\u0E41\u0E14\u0E07\n\u0E41\u0E15\u0E48\u0E25\u0E30\u0E0A\u0E34\u0E49\u0E19\u0E15\u0E49\u0E2D\u0E07\u0E01\u0E32\u0E23: \u0E21\u0E34\u0E18\u0E34\u0E01 Lv.100 + Mastery Lv.10 + Mythic Gears 2 \u0E0A\u0E34\u0E49\u0E19" },
    "phaseD.7": { en: "Push Infantry Chest (Red) to L79 and Infantry Gloves (Red) to L100", es: "Sube la Pechera de Infanter\xEDa (Rojo) a L79 y los Guantes de Infanter\xEDa (Rojo) a L100", pt: "Suba o Peitoral de Infantaria (Vermelho) at\xE9 L79 e as Luvas de Infantaria (Vermelho) at\xE9 L100", fr: "Monte le Plastron d\u2019Infanterie (Rouge) \xE0 L79 et les Gants d\u2019Infanterie (Rouge) \xE0 L100", de: "Bring Infanterie-Brustpanzer (Rot) auf L79 und Infanterie-Handschuhe (Rot) auf L100", it: "Porta la Corazza di Fanteria (Rosso) a L79 e i Guanti di Fanteria (Rosso) a L100", nl: "Breng Infanterie-Borststuk (Rood) naar L79 en Infanterie-Handschoenen (Rood) naar L100", ru: "\u0414\u043E\u0432\u0435\u0434\u0438\u0442\u0435 \u043D\u0430\u0433\u0440\u0443\u0434\u043D\u0438\u043A \u041F\u0435\u0445\u043E\u0442\u044B (\u041A\u0440\u0430\u0441\u043D\u044B\u0439) \u0434\u043E L79 \u0438 \u043F\u0435\u0440\u0447\u0430\u0442\u043A\u0438 \u041F\u0435\u0445\u043E\u0442\u044B (\u041A\u0440\u0430\u0441\u043D\u044B\u0439) \u0434\u043E L100", pl: "Rozwi\u0144 Napier\u015Bnik Piechoty (Czerwony) do L79 i R\u0119kawice Piechoty (Czerwony) do L100", tr: "Piyade G\xF6\u011F\xFCsl\xFC\u011F\xFCn\xFC (K\u0131rm\u0131z\u0131) L79\u2019a ve Piyade Eldivenini (K\u0131rm\u0131z\u0131) L100\u2019e getir", ar: "\u0637\u0648\u0651\u0631 \u062F\u0631\u0639 \u0635\u062F\u0631 \u0627\u0644\u0645\u0634\u0627\u0629 (\u0623\u062D\u0645\u0631) \u0625\u0644\u0649 L79 \u0648\u0642\u0641\u0627\u0632\u0627\u062A \u0627\u0644\u0645\u0634\u0627\u0629 (\u0623\u062D\u0645\u0631) \u0625\u0644\u0649 L100", he: "\u05D3\u05D7\u05D5\u05E3 \u05D0\u05EA \u05E9\u05E8\u05D9\u05D5\u05DF \u05D7\u05D6\u05D4 \u05D4\u05D7\u05D9\u05F4\u05E8 (\u05D0\u05D3\u05D5\u05DD) \u05DC-L79 \u05D5\u05D0\u05EA \u05DB\u05E4\u05E4\u05D5\u05EA \u05D4\u05D7\u05D9\u05F4\u05E8 (\u05D0\u05D3\u05D5\u05DD) \u05DC-L100", zh: "\u5C06\u6B65\u5175\u80F8\u7532\uFF08\u7EA2\u8272\uFF09\u5347\u81F3L79\uFF0C\u6B65\u5175\u624B\u5957\uFF08\u7EA2\u8272\uFF09\u5347\u81F3L100", ja: "\u6B69\u5175\u30C1\u30A7\u30B9\u30C8\uFF08\u8D64\uFF09\u3092L79\u3001\u6B69\u5175\u624B\u888B\uFF08\u8D64\uFF09\u3092L100\u307E\u3067", ko: "\uBCF4\uBCD1 \uAC11\uC637(\uB808\uB4DC)\uC744 L79, \uBCF4\uBCD1 \uC7A5\uAC11(\uB808\uB4DC)\uC744 L100\uAE4C\uC9C0", id: "Naikkan Dada Infanteri (Merah) ke L79 dan Sarung Tangan Infanteri (Merah) ke L100", vi: "N\xE2ng Gi\xE1p ng\u1EF1c B\u1ED9 binh (\u0110\u1ECF) l\xEAn L79 v\xE0 G\u0103ng tay B\u1ED9 binh (\u0110\u1ECF) l\xEAn L100", th: "\u0E14\u0E31\u0E19\u0E40\u0E01\u0E23\u0E32\u0E30\u0E2D\u0E01\u0E17\u0E2B\u0E32\u0E23\u0E23\u0E32\u0E1A (\u0E41\u0E14\u0E07) \u0E40\u0E1B\u0E47\u0E19 L79 \u0E41\u0E25\u0E30\u0E16\u0E38\u0E07\u0E21\u0E37\u0E2D\u0E17\u0E2B\u0E32\u0E23\u0E23\u0E32\u0E1A (\u0E41\u0E14\u0E07) \u0E40\u0E1B\u0E47\u0E19 L100" },
    "phaseD.choose": { en: "Base path complete! Pick your endgame route and the app will keep guiding you:\nRally Attack or Defense Garrison.", es: "\xA1Camino base completado! Elige tu ruta de end-game y la app seguir\xE1 gui\xE1ndote:\nAtaque de Rally o Guarnici\xF3n Defensiva.", pt: "Caminho base completo! Escolha sua rota de end-game e o app continuar\xE1 guiando voc\xEA:\nAtaque de Rally ou Guarni\xE7\xE3o Defensiva.", fr: "Parcours de base termin\xE9 ! Choisis ta route de fin de jeu et l\u2019app continuera \xE0 te guider :\nAttaque de Ralliement ou Garnison D\xE9fensive.", de: "Basispfad abgeschlossen! W\xE4hle deine Endgame-Route und die App f\xFChrt dich weiter:\nRally-Angriff oder Verteidigungsgarnison.", it: "Percorso base completato! Scegli la tua rotta di end-game e l\u2019app continuer\xE0 a guidarti:\nAttacco Rally o Guarnigione Difensiva.", nl: "Basispad voltooid! Kies je endgame-route en de app blijft je begeleiden:\nRally-aanval of Verdedigingsgarnizoen.", ru: "\u0411\u0430\u0437\u043E\u0432\u044B\u0439 \u043F\u0443\u0442\u044C \u043F\u0440\u043E\u0439\u0434\u0435\u043D! \u0412\u044B\u0431\u0435\u0440\u0438\u0442\u0435 \u0441\u0432\u043E\u0439 \u044D\u043D\u0434-\u0433\u0435\u0439\u043C \u043C\u0430\u0440\u0448\u0440\u0443\u0442, \u0438 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0435 \u043F\u0440\u043E\u0434\u043E\u043B\u0436\u0438\u0442 \u0432\u0435\u0441\u0442\u0438 \u0432\u0430\u0441:\n\u0410\u0442\u0430\u043A\u0430 (\u0440\u0435\u0439\u0434) \u0438\u043B\u0438 \u041E\u0431\u043E\u0440\u043E\u043D\u0430 (\u0433\u0430\u0440\u043D\u0438\u0437\u043E\u043D).", pl: "\u015Acie\u017Cka bazowa uko\u0144czona! Wybierz tras\u0119 end-game, a aplikacja poprowadzi ci\u0119 dalej:\nAtak Rally lub Garnizon Obronny.", tr: "Temel yol tamamland\u0131! Son oyun rotan\u0131 se\xE7, uygulama seni y\xF6nlendirmeye devam etsin:\nRally Sald\u0131r\u0131s\u0131 veya Savunma Garnizonu.", ar: "\u0627\u0643\u062A\u0645\u0644 \u0627\u0644\u0645\u0633\u0627\u0631 \u0627\u0644\u0623\u0633\u0627\u0633\u064A! \u0627\u062E\u062A\u0631 \u0637\u0631\u064A\u0642 \u0646\u0647\u0627\u064A\u0629 \u0627\u0644\u0644\u0639\u0628\u0629 \u0648\u0633\u064A\u0648\u0627\u0635\u0644 \u0627\u0644\u062A\u0637\u0628\u064A\u0642 \u0625\u0631\u0634\u0627\u062F\u0643:\n\u0647\u062C\u0648\u0645 \u0627\u0644\u062D\u0634\u062F \u0623\u0648 \u0627\u0644\u062D\u0627\u0645\u064A\u0629 \u0627\u0644\u062F\u0641\u0627\u0639\u064A\u0629.", he: "\u05D4\u05DE\u05E1\u05DC\u05D5\u05DC \u05D4\u05D1\u05E1\u05D9\u05E1\u05D9 \u05D4\u05D5\u05E9\u05DC\u05DD! \u05D1\u05D7\u05E8 \u05D0\u05EA \u05DE\u05E1\u05DC\u05D5\u05DC \u05D4\u05D0\u05E0\u05D3\u05D2\u05D9\u05D9\u05DD \u05D5\u05D4\u05D0\u05E4\u05DC\u05D9\u05E7\u05E6\u05D9\u05D4 \u05EA\u05DE\u05E9\u05D9\u05DA \u05DC\u05D4\u05D3\u05E8\u05D9\u05DA \u05D0\u05D5\u05EA\u05DA:\n\u05DE\u05EA\u05E7\u05E4\u05EA \u05E8\u05D0\u05DC\u05D9 \u05D0\u05D5 \u05D7\u05D9\u05DC \u05DE\u05E6\u05D1 \u05D4\u05D2\u05E0\u05EA\u05D9.", zh: "\u57FA\u7840\u8DEF\u5F84\u5B8C\u6210\uFF01\u9009\u62E9\u4F60\u7684\u7EC8\u5C40\u8DEF\u7EBF\uFF0C\u5E94\u7528\u4F1A\u7EE7\u7EED\u5F15\u5BFC\u4F60\uFF1A\n\u96C6\u7ED3\u8FDB\u653B \u6216 \u9632\u5FA1\u9A7B\u519B\u3002", ja: "\u57FA\u672C\u30D1\u30B9\u5B8C\u4E86\uFF01\u30A8\u30F3\u30C9\u30B2\u30FC\u30E0\u306E\u30EB\u30FC\u30C8\u3092\u9078\u3076\u3068\u30A2\u30D7\u30EA\u304C\u6848\u5185\u3092\u7D9A\u3051\u307E\u3059\uFF1A\n\u30E9\u30EA\u30FC\u653B\u6483 \u307E\u305F\u306F \u9632\u885B\u99D0\u5C6F\u3002", ko: "\uAE30\uBCF8 \uACBD\uB85C \uC644\uB8CC! \uC5D4\uB4DC\uAC8C\uC784 \uACBD\uB85C\uB97C \uC120\uD0DD\uD558\uBA74 \uC571\uC774 \uACC4\uC18D \uC548\uB0B4\uD569\uB2C8\uB2E4:\n\uC9D1\uACB0 \uACF5\uACA9 \uB610\uB294 \uBC29\uC5B4 \uC8FC\uB454.", id: "Jalur dasar selesai! Pilih rute endgame-mu dan app akan terus memandu:\nSerangan Rally atau Garnisun Pertahanan.", vi: "Ho\xE0n th\xE0nh l\u1ED9 tr\xECnh c\u01A1 b\u1EA3n! Ch\u1ECDn h\u01B0\u1EDBng cu\u1ED1i game v\xE0 app s\u1EBD ti\u1EBFp t\u1EE5c h\u01B0\u1EDBng d\u1EABn:\nT\u1EA5n c\xF4ng Rally ho\u1EB7c \u0110\u1ED3n tr\xFA ph\xF2ng th\u1EE7.", th: "\u0E40\u0E2A\u0E49\u0E19\u0E17\u0E32\u0E07\u0E1E\u0E37\u0E49\u0E19\u0E10\u0E32\u0E19\u0E40\u0E2A\u0E23\u0E47\u0E08\u0E41\u0E25\u0E49\u0E27! \u0E40\u0E25\u0E37\u0E2D\u0E01\u0E40\u0E2A\u0E49\u0E19\u0E17\u0E32\u0E07\u0E17\u0E49\u0E32\u0E22\u0E40\u0E01\u0E21 \u0E41\u0E25\u0E49\u0E27\u0E41\u0E2D\u0E1B\u0E08\u0E30\u0E19\u0E33\u0E17\u0E32\u0E07\u0E15\u0E48\u0E2D:\n\u0E42\u0E08\u0E21\u0E15\u0E35\u0E41\u0E1A\u0E1A Rally \u0E2B\u0E23\u0E37\u0E2D \u0E01\u0E2D\u0E07\u0E23\u0E31\u0E01\u0E29\u0E32\u0E01\u0E32\u0E23\u0E13\u0E4C\u0E1B\u0E49\u0E2D\u0E07\u0E01\u0E31\u0E19" },
    "phaseD.done": { en: "You\u2019ve finished the full Red gear path. Outstanding work, Commander.", es: "Has completado todo el camino del equipo Rojo. Excelente trabajo, Comandante.", pt: "Voc\xEA concluiu todo o caminho do equipamento Vermelho. Excelente trabalho, Comandante.", fr: "Tu as termin\xE9 tout le parcours de l\u2019\xE9quipement Rouge. Travail remarquable, Commandant.", de: "Du hast den gesamten Rot-Ausr\xFCstungspfad abgeschlossen. Hervorragende Arbeit, Kommandant.", it: "Hai completato l\u2019intero percorso dell\u2019equipaggiamento Rosso. Lavoro eccellente, Comandante.", nl: "Je hebt het volledige Rode uitrustingspad voltooid. Uitstekend werk, Commandant.", ru: "\u0412\u044B \u043F\u0440\u043E\u0448\u043B\u0438 \u0432\u0435\u0441\u044C \u043F\u0443\u0442\u044C \u043A\u0440\u0430\u0441\u043D\u043E\u0433\u043E \u0441\u043D\u0430\u0440\u044F\u0436\u0435\u043D\u0438\u044F. \u041E\u0442\u043B\u0438\u0447\u043D\u0430\u044F \u0440\u0430\u0431\u043E\u0442\u0430, \u043A\u043E\u043C\u0430\u043D\u0434\u0438\u0440.", pl: "Uko\u0144czy\u0142e\u015B ca\u0142\u0105 \u015Bcie\u017Ck\u0119 Czerwonego sprz\u0119tu. \u015Awietna robota, Dow\xF3dco.", tr: "T\xFCm K\u0131rm\u0131z\u0131 ekipman yolunu bitirdin. M\xFCkemmel i\u015F, Komutan.", ar: "\u0623\u0643\u0645\u0644\u062A \u0645\u0633\u0627\u0631 \u0627\u0644\u0639\u062A\u0627\u062F \u0627\u0644\u0623\u062D\u0645\u0631 \u0628\u0627\u0644\u0643\u0627\u0645\u0644. \u0639\u0645\u0644 \u0631\u0627\u0626\u0639 \u0623\u064A\u0647\u0627 \u0627\u0644\u0642\u0627\u0626\u062F.", he: "\u05E1\u05D9\u05D9\u05DE\u05EA \u05D0\u05EA \u05DB\u05DC \u05DE\u05E1\u05DC\u05D5\u05DC \u05D4\u05E6\u05D9\u05D5\u05D3 \u05D4\u05D0\u05D3\u05D5\u05DD. \u05E2\u05D1\u05D5\u05D3\u05D4 \u05DE\u05E6\u05D5\u05D9\u05E0\u05EA, \u05DE\u05E4\u05E7\u05D3.", zh: "\u4F60\u5DF2\u5B8C\u6210\u5168\u90E8\u7EA2\u8272\u88C5\u5907\u8DEF\u5F84\u3002\u5E72\u5F97\u6F02\u4EAE\uFF0C\u6307\u6325\u5B98\u3002", ja: "\u30EC\u30C3\u30C9\u88C5\u5099\u306E\u5168\u30D1\u30B9\u3092\u5B8C\u4E86\u3057\u307E\u3057\u305F\u3002\u898B\u4E8B\u3067\u3059\u3001\u6307\u63EE\u5B98\u3002", ko: "\uB808\uB4DC \uC7A5\uBE44 \uC804\uCCB4 \uACBD\uB85C\uB97C \uC644\uB8CC\uD588\uC2B5\uB2C8\uB2E4. \uD6CC\uB96D\uD569\uB2C8\uB2E4, \uC9C0\uD718\uAD00\uB2D8.", id: "Kamu menyelesaikan seluruh jalur gear Merah. Kerja bagus, Komandan.", vi: "B\u1EA1n \u0111\xE3 ho\xE0n th\xE0nh to\xE0n b\u1ED9 l\u1ED9 tr\xECnh trang b\u1ECB \u0110\u1ECF. Tuy\u1EC7t v\u1EDDi, Ch\u1EC9 huy.", th: "\u0E04\u0E38\u0E13\u0E17\u0E33\u0E40\u0E2A\u0E49\u0E19\u0E17\u0E32\u0E07\u0E40\u0E01\u0E35\u0E22\u0E23\u0E4C\u0E2A\u0E35\u0E41\u0E14\u0E07\u0E04\u0E23\u0E1A\u0E17\u0E31\u0E49\u0E07\u0E2B\u0E21\u0E14\u0E41\u0E25\u0E49\u0E27 \u0E22\u0E2D\u0E14\u0E40\u0E22\u0E35\u0E48\u0E22\u0E21\u0E21\u0E32\u0E01 \u0E1C\u0E39\u0E49\u0E1A\u0E31\u0E0D\u0E0A\u0E32\u0E01\u0E32\u0E23" },
    "phaseD.spec": { en: "{label} specialization \u2014 push these pieces to their Red targets.", es: "Especializaci\xF3n {label} \u2014 sube estas piezas a sus objetivos Rojos.", pt: "Especializa\xE7\xE3o {label} \u2014 suba estas pe\xE7as at\xE9 seus alvos Vermelhos.", fr: "Sp\xE9cialisation {label} \u2014 monte ces pi\xE8ces \xE0 leurs objectifs Rouges.", de: "Spezialisierung {label} \u2014 bring diese Teile auf ihre Rot-Ziele.", it: "Specializzazione {label} \u2014 porta questi pezzi ai loro obiettivi Rossi.", nl: "Specialisatie {label} \u2014 breng deze stukken naar hun Rode doelen.", ru: "\u0421\u043F\u0435\u0446\u0438\u0430\u043B\u0438\u0437\u0430\u0446\u0438\u044F \xAB{label}\xBB \u2014 \u0434\u043E\u0432\u0435\u0434\u0438\u0442\u0435 \u044D\u0442\u0438 \u043F\u0440\u0435\u0434\u043C\u0435\u0442\u044B \u0434\u043E \u0438\u0445 \u043A\u0440\u0430\u0441\u043D\u044B\u0445 \u0446\u0435\u043B\u0435\u0439.", pl: "Specjalizacja {label} \u2014 rozwi\u0144 te cz\u0119\u015Bci do ich Czerwonych cel\xF3w.", tr: "{label} uzmanl\u0131\u011F\u0131 \u2014 bu par\xE7alar\u0131 K\u0131rm\u0131z\u0131 hedeflerine getir.", ar: "\u062A\u062E\u0635\u0635 {label} \u2014 \u0637\u0648\u0651\u0631 \u0647\u0630\u0647 \u0627\u0644\u0642\u0637\u0639 \u0625\u0644\u0649 \u0623\u0647\u062F\u0627\u0641\u0647\u0627 \u0627\u0644\u062D\u0645\u0631\u0627\u0621.", he: "\u05D4\u05EA\u05DE\u05D7\u05D5\u05EA {label} \u2014 \u05D3\u05D7\u05D5\u05E3 \u05D0\u05EA \u05D4\u05D7\u05DC\u05E7\u05D9\u05DD \u05D4\u05D0\u05DC\u05D4 \u05DC\u05D9\u05E2\u05D3\u05D9 \u05D4\u05D0\u05D3\u05D5\u05DD \u05E9\u05DC\u05D4\u05DD.", zh: "{label} \u4E13\u7CBE \u2014 \u5C06\u8FD9\u4E9B\u88C5\u5907\u63D0\u5347\u5230\u5BF9\u5E94\u7684\u7EA2\u8272\u76EE\u6807\u3002", ja: "{label} \u7279\u5316 \u2014 \u3053\u308C\u3089\u306E\u88C5\u5099\u3092\u8D64\u306E\u76EE\u6A19\u307E\u3067\u5F37\u5316\u3002", ko: "{label} \uD2B9\uD654 \u2014 \uC774 \uC7A5\uBE44\uB4E4\uC744 \uB808\uB4DC \uBAA9\uD45C\uCE58\uAE4C\uC9C0 \uC62C\uB9AC\uC138\uC694.", id: "Spesialisasi {label} \u2014 naikkan bagian ini ke target Merahnya.", vi: "Chuy\xEAn m\xF4n h\xF3a {label} \u2014 n\xE2ng c\xE1c m\xF3n n\xE0y t\u1EDBi m\u1EE5c ti\xEAu \u0110\u1ECF.", th: "\u0E01\u0E32\u0E23\u0E40\u0E0A\u0E35\u0E48\u0E22\u0E27\u0E0A\u0E32\u0E0D {label} \u2014 \u0E14\u0E31\u0E19\u0E0A\u0E34\u0E49\u0E19\u0E40\u0E2B\u0E25\u0E48\u0E32\u0E19\u0E35\u0E49\u0E44\u0E1B\u0E22\u0E31\u0E07\u0E40\u0E1B\u0E49\u0E32\u0E2B\u0E21\u0E32\u0E22\u0E2A\u0E35\u0E41\u0E14\u0E07" },
