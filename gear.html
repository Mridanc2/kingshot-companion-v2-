    "alliance.motto2": { en: "WE GROW TOGETHER", es: "CRECEMOS JUNTOS", pt: "CRESCEMOS JUNTOS", fr: "NOUS GRANDISSONS ENSEMBLE", de: "WIR WACHSEN ZUSAMMEN", it: "CRESCIAMO INSIEME", nl: "WE GROEIEN SAMEN", ru: "\u041C\u042B \u0420\u0410\u0421\u0422\u0401\u041C \u0412\u041C\u0415\u0421\u0422\u0415", pl: "RO\u015ANIEMY RAZEM", tr: "B\u0130RL\u0130KTE B\xDCY\xDCR\xDCZ", ar: "\u0646\u0646\u0645\u0648 \u0645\u0639\u064B\u0627", he: "\u05D0\u05E0\u05D7\u05E0\u05D5 \u05D2\u05D3\u05DC\u05D9\u05DD \u05D9\u05D7\u05D3", zh: "\u6211\u4EEC\u540C\u957F", ja: "\u5171\u306B\u6210\u9577\u3059\u308B", ko: "\uD568\uAED8 \uC131\uC7A5\uD55C\uB2E4", id: "KITA TUMBUH BERSAMA", vi: "CH\xDANG TA C\xD9NG L\u1EDAN M\u1EA0NH", th: "\u0E40\u0E23\u0E32\u0E40\u0E15\u0E34\u0E1A\u0E42\u0E15\u0E23\u0E48\u0E27\u0E21\u0E01\u0E31\u0E19" },
    "alliance.motto3": { en: "WE FIGHT TOGETHER", es: "LUCHAMOS JUNTOS", pt: "LUTAMOS JUNTOS", fr: "NOUS COMBATTONS ENSEMBLE", de: "WIR K\xC4MPFEN ZUSAMMEN", it: "COMBATTIAMO INSIEME", nl: "WE VECHTEN SAMEN", ru: "\u041C\u042B \u0421\u0420\u0410\u0416\u0410\u0415\u041C\u0421\u042F \u0412\u041C\u0415\u0421\u0422\u0415", pl: "WALCZYMY RAZEM", tr: "B\u0130RL\u0130KTE SAVA\u015EIRIZ", ar: "\u0646\u0642\u0627\u062A\u0644 \u0645\u0639\u064B\u0627", he: "\u05D0\u05E0\u05D7\u05E0\u05D5 \u05E0\u05DC\u05D7\u05DE\u05D9\u05DD \u05D9\u05D7\u05D3", zh: "\u6211\u4EEC\u540C\u6218", ja: "\u5171\u306B\u6226\u3046", ko: "\uD568\uAED8 \uC2F8\uC6B4\uB2E4", id: "KITA BERTARUNG BERSAMA", vi: "CH\xDANG TA C\xD9NG CHI\u1EBEN \u0110\u1EA4U", th: "\u0E40\u0E23\u0E32\u0E2A\u0E39\u0E49\u0E23\u0E48\u0E27\u0E21\u0E01\u0E31\u0E19" },
    "help.request": { en: "\u{1F198} Ask leaders for help", he: "\u{1F198} \u05D1\u05E7\u05E9 \u05E2\u05D6\u05E8\u05D4 \u05DE\u05D4\u05DC\u05D9\u05D3\u05E8\u05D9\u05DD", es: "\u{1F198} Pedir ayuda a los l\xEDderes", pt: "\u{1F198} Pedir ajuda aos l\xEDderes", fr: "\u{1F198} Demander de l\u2019aide aux chefs", de: "\u{1F198} Anf\xFChrer um Hilfe bitten", ru: "\u{1F198} \u041F\u043E\u043F\u0440\u043E\u0441\u0438\u0442\u044C \u043F\u043E\u043C\u043E\u0449\u0438 \u0443 \u043B\u0438\u0434\u0435\u0440\u043E\u0432", ar: "\u{1F198} \u0627\u0637\u0644\u0628 \u0627\u0644\u0645\u0633\u0627\u0639\u062F\u0629 \u0645\u0646 \u0627\u0644\u0642\u0627\u062F\u0629" },
    "help.requested": { en: "\u{1F198} Help requested \u2014 leaders notified", he: "\u{1F198} \u05D1\u05E7\u05E9\u05EA \u05D4\u05E2\u05D6\u05E8\u05D4 \u05E0\u05E9\u05DC\u05D7\u05D4 \u2014 \u05D4\u05DC\u05D9\u05D3\u05E8\u05D9\u05DD \u05D9\u05E8\u05D0\u05D5", es: "\u{1F198} Ayuda solicitada \u2014 l\xEDderes avisados", pt: "\u{1F198} Ajuda solicitada \u2014 l\xEDderes avisados", fr: "\u{1F198} Aide demand\xE9e \u2014 chefs pr\xE9venus", de: "\u{1F198} Hilfe angefordert \u2014 Anf\xFChrer informiert", ru: "\u{1F198} \u0417\u0430\u043F\u0440\u043E\u0448\u0435\u043D\u0430 \u043F\u043E\u043C\u043E\u0449\u044C \u2014 \u043B\u0438\u0434\u0435\u0440\u044B \u0443\u0432\u0435\u0434\u043E\u043C\u043B\u0435\u043D\u044B", ar: "\u{1F198} \u062A\u0645 \u0637\u0644\u0628 \u0627\u0644\u0645\u0633\u0627\u0639\u062F\u0629 \u2014 \u0623\u064F\u0628\u0644\u063A \u0627\u0644\u0642\u0627\u062F\u0629" },
    "help.cancel": { en: "Cancel request", he: "\u05D1\u05D8\u05DC \u05D1\u05E7\u05E9\u05D4", es: "Cancelar solicitud", pt: "Cancelar pedido", fr: "Annuler la demande", de: "Anfrage abbrechen", ru: "\u041E\u0442\u043C\u0435\u043D\u0438\u0442\u044C \u0437\u0430\u043F\u0440\u043E\u0441", ar: "\u0625\u0644\u063A\u0627\u0621 \u0627\u0644\u0637\u0644\u0628" },
    "help.hint": { en: "Leaders will review your gear and suggest how to build and improve.", he: "\u05D4\u05DC\u05D9\u05D3\u05E8\u05D9\u05DD \u05D9\u05D1\u05D3\u05E7\u05D5 \u05D0\u05EA \u05D4\u05E6\u05D9\u05D5\u05D3 \u05E9\u05DC\u05DA \u05D5\u05D9\u05E6\u05D9\u05E2\u05D5 \u05D0\u05D9\u05DA \u05DC\u05D1\u05E0\u05D5\u05EA \u05D5\u05DC\u05E9\u05E4\u05E8.", es: "Los l\xEDderes revisar\xE1n tu equipo y sugerir\xE1n c\xF3mo mejorar.", pt: "Os l\xEDderes v\xE3o analisar seu equipamento e sugerir melhorias.", fr: "Les chefs examineront ton \xE9quipement et te conseilleront.", de: "Anf\xFChrer pr\xFCfen deine Ausr\xFCstung und geben Tipps.", ru: "\u041B\u0438\u0434\u0435\u0440\u044B \u043F\u043E\u0441\u043C\u043E\u0442\u0440\u044F\u0442 \u0432\u0430\u0448\u0435 \u0441\u043D\u0430\u0440\u044F\u0436\u0435\u043D\u0438\u0435 \u0438 \u043F\u043E\u0434\u0441\u043A\u0430\u0436\u0443\u0442, \u043A\u0430\u043A \u0443\u043B\u0443\u0447\u0448\u0438\u0442\u044C.", ar: "\u0633\u064A\u0631\u0627\u062C\u0639 \u0627\u0644\u0642\u0627\u062F\u0629 \u0639\u062A\u0627\u062F\u0643 \u0648\u064A\u0642\u062A\u0631\u062D\u0648\u0646 \u0643\u064A\u0641\u064A\u0629 \u0627\u0644\u062A\u062D\u0633\u064A\u0646." },
    "help.needsBadge": { en: "NEEDS HELP", he: "\u05E6\u05E8\u05D9\u05DA \u05E2\u05D6\u05E8\u05D4", es: "NECESITA AYUDA", pt: "PRECISA DE AJUDA", fr: "AIDE DEMAND\xC9E", de: "BRAUCHT HILFE", ru: "\u041D\u0423\u0416\u041D\u0410 \u041F\u041E\u041C\u041E\u0429\u042C", ar: "\u064A\u062D\u062A\u0627\u062C \u0645\u0633\u0627\u0639\u062F\u0629" },
    "help.count": { en: "\u{1F198} {n} asked for help", he: "\u{1F198} {n} \u05D1\u05D9\u05E7\u05E9\u05D5 \u05E2\u05D6\u05E8\u05D4", es: "\u{1F198} {n} pidieron ayuda", pt: "\u{1F198} {n} pediram ajuda", fr: "\u{1F198} {n} ont demand\xE9 de l\u2019aide", de: "\u{1F198} {n} bitten um Hilfe", ru: "\u{1F198} {n} \u043F\u0440\u043E\u0441\u044F\u0442 \u043F\u043E\u043C\u043E\u0449\u0438", ar: "\u{1F198} {n} \u0637\u0644\u0628\u0648\u0627 \u0627\u0644\u0645\u0633\u0627\u0639\u062F\u0629" },
    "welcome.what": { en: "Shake's Red Gear path, plus a transparent gear board for your whole alliance \u2014 everyone can see and compare progress.", he: "\u05DE\u05E1\u05DC\u05D5\u05DC \u05D4\u05E6\u05D9\u05D5\u05D3 \u05D4\u05D0\u05D3\u05D5\u05DD \u05E9\u05DC Shake, \u05D5\u05E2\u05D5\u05D3 \u05DC\u05D5\u05D7 \u05E6\u05D9\u05D5\u05D3 \u05E9\u05E7\u05D5\u05E3 \u05DC\u05DB\u05DC \u05D4\u05D1\u05E8\u05D9\u05EA \u2014 \u05DB\u05D5\u05DC\u05DD \u05E8\u05D5\u05D0\u05D9\u05DD \u05D5\u05DE\u05E9\u05D5\u05D5\u05D9\u05DD \u05D4\u05EA\u05E7\u05D3\u05DE\u05D5\u05EA.", es: "La ruta de equipo rojo de Shake, m\xE1s un tablero de equipo transparente para toda tu alianza.", pt: "O caminho do equipamento vermelho do Shake, mais um quadro transparente para toda a alian\xE7a.", fr: "Le parcours d\u2019\xE9quipement rouge de Shake, plus un tableau transparent pour toute l\u2019alliance.", de: "Shakes Rot-Ausr\xFCstungspfad, plus ein transparentes Ausr\xFCstungsboard f\xFCr die ganze Allianz.", ru: "\u041F\u0443\u0442\u044C \u043A \u043A\u0440\u0430\u0441\u043D\u043E\u043C\u0443 \u0441\u043D\u0430\u0440\u044F\u0436\u0435\u043D\u0438\u044E \u043E\u0442 Shake \u0438 \u043F\u0440\u043E\u0437\u0440\u0430\u0447\u043D\u0430\u044F \u0434\u043E\u0441\u043A\u0430 \u0441\u043D\u0430\u0440\u044F\u0436\u0435\u043D\u0438\u044F \u0434\u043B\u044F \u0432\u0441\u0435\u0433\u043E \u0430\u043B\u044C\u044F\u043D\u0441\u0430.", ar: "\u0645\u0633\u0627\u0631 \u0627\u0644\u0639\u062A\u0627\u062F \u0627\u0644\u0623\u062D\u0645\u0631 \u0645\u0646 Shake\u060C \u0645\u0639 \u0644\u0648\u062D\u0629 \u0639\u062A\u0627\u062F \u0634\u0641\u0627\u0641\u0629 \u0644\u062A\u062D\u0627\u0644\u0641\u0643 \u0643\u0644\u0647." },
    "welcome.steps": { en: "1) Choose your alliance \xB7 2) Enter your gear \xB7 3) Follow your personal plan to full Red.", he: "1) \u05D1\u05D7\u05E8 \u05D1\u05E8\u05D9\u05EA \xB7 2) \u05D4\u05D6\u05DF \u05D0\u05EA \u05D4\u05E6\u05D9\u05D5\u05D3 \u05E9\u05DC\u05DA \xB7 3) \u05E2\u05E7\u05D5\u05D1 \u05D0\u05D7\u05E8 \u05D4\u05EA\u05D5\u05DB\u05E0\u05D9\u05EA \u05D4\u05D0\u05D9\u05E9\u05D9\u05EA \u05E2\u05D3 Red \u05DE\u05DC\u05D0.", es: "1) Elige tu alianza \xB7 2) Ingresa tu equipo \xB7 3) Sigue tu plan personal.", pt: "1) Escolha sua alian\xE7a \xB7 2) Insira seu equipamento \xB7 3) Siga seu plano pessoal.", fr: "1) Choisis ton alliance \xB7 2) Saisis ton \xE9quipement \xB7 3) Suis ton plan personnel.", de: "1) W\xE4hle deine Allianz \xB7 2) Gib deine Ausr\xFCstung ein \xB7 3) Folge deinem Plan.", ru: "1) \u0412\u044B\u0431\u0435\u0440\u0438\u0442\u0435 \u0430\u043B\u044C\u044F\u043D\u0441 \xB7 2) \u0412\u0432\u0435\u0434\u0438\u0442\u0435 \u0441\u043D\u0430\u0440\u044F\u0436\u0435\u043D\u0438\u0435 \xB7 3) \u0421\u043B\u0435\u0434\u0443\u0439\u0442\u0435 \u043B\u0438\u0447\u043D\u043E\u043C\u0443 \u043F\u043B\u0430\u043D\u0443.", ar: "1) \u0627\u062E\u062A\u0631 \u062A\u062D\u0627\u0644\u0641\u0643 \xB7 2) \u0623\u062F\u062E\u0644 \u0639\u062A\u0627\u062F\u0643 \xB7 3) \u0627\u062A\u0628\u0639 \u062E\u0637\u062A\u0643 \u0627\u0644\u0634\u062E\u0635\u064A\u0629." },
    "welcome.chooseAlliance": { en: "First, choose your alliance", he: "\u05E7\u05D5\u05D3\u05DD \u05DB\u05DC, \u05D1\u05D7\u05E8 \u05D0\u05EA \u05D4\u05D1\u05E8\u05D9\u05EA \u05E9\u05DC\u05DA", es: "Primero, elige tu alianza", pt: "Primeiro, escolha sua alian\xE7a", fr: "D\u2019abord, choisis ton alliance", de: "W\xE4hle zuerst deine Allianz", ru: "\u0421\u043D\u0430\u0447\u0430\u043B\u0430 \u0432\u044B\u0431\u0435\u0440\u0438\u0442\u0435 \u0430\u043B\u044C\u044F\u043D\u0441", ar: "\u0623\u0648\u0644\u064B\u0627\u060C \u0627\u062E\u062A\u0631 \u062A\u062D\u0627\u0644\u0641\u0643" },
    "welcome.skip": { en: "Skip \u2014 just use the guide", he: "\u05D3\u05DC\u05D2 \u2014 \u05E8\u05E7 \u05DC\u05D4\u05E9\u05EA\u05DE\u05E9 \u05D1\u05DE\u05D3\u05E8\u05D9\u05DA", es: "Omitir \u2014 solo usar la gu\xEDa", pt: "Pular \u2014 s\xF3 usar o guia", fr: "Passer \u2014 utiliser juste le guide", de: "\xDCberspringen \u2014 nur den Guide nutzen", ru: "\u041F\u0440\u043E\u043F\u0443\u0441\u0442\u0438\u0442\u044C \u2014 \u043F\u0440\u043E\u0441\u0442\u043E \u0433\u0430\u0439\u0434", ar: "\u062A\u062E\u0637\u064D\u0651 \u2014 \u0627\u0633\u062A\u062E\u062F\u0645 \u0627\u0644\u062F\u0644\u064A\u0644 \u0641\u0642\u0637" },
    "welcome.returning": { en: "Already have an alliance? Tap Join, enter your code, and tick \u201CI lead\u201D to get your leader tools back.", he: '\u05DB\u05D1\u05E8 \u05D9\u05E9 \u05DC\u05DA \u05D1\u05E8\u05D9\u05EA? \u05DC\u05D7\u05E5 "\u05D4\u05E6\u05D8\u05E8\u05E3", \u05D4\u05D6\u05DF \u05D0\u05EA \u05D4\u05E7\u05D5\u05D3 \u05E9\u05DC\u05DA \u05D5\u05E1\u05DE\u05DF "\u05D0\u05E0\u05D9 \u05DC\u05D9\u05D3\u05E8" \u05DB\u05D3\u05D9 \u05DC\u05E7\u05D1\u05DC \u05D1\u05D7\u05D6\u05E8\u05D4 \u05D0\u05EA \u05DB\u05DC\u05D9 \u05D4\u05E0\u05D9\u05D4\u05D5\u05DC.', es: '\xBFYa tienes alianza? Toca Unirse, pon tu c\xF3digo y marca "Soy l\xEDder".', pt: 'J\xE1 tem alian\xE7a? Toque em Entrar, insira seu c\xF3digo e marque "Sou l\xEDder".', fr: 'Tu as d\xE9j\xE0 une alliance ? Touche Rejoindre, entre ton code et coche "Je dirige".', de: 'Schon eine Allianz? Tippe Beitreten, gib deinen Code ein und hake "Ich leite" an.', ru: '\u0423\u0436\u0435 \u0435\u0441\u0442\u044C \u0430\u043B\u044C\u044F\u043D\u0441? \u041D\u0430\u0436\u043C\u0438\u0442\u0435 \u0412\u043E\u0439\u0442\u0438, \u0432\u0432\u0435\u0434\u0438\u0442\u0435 \u043A\u043E\u0434 \u0438 \u043E\u0442\u043C\u0435\u0442\u044C\u0442\u0435 "\u042F \u043B\u0438\u0434\u0435\u0440".', ar: '\u0644\u062F\u064A\u0643 \u062A\u062D\u0627\u0644\u0641\u061F \u0627\u0636\u063A\u0637 \u0627\u0646\u0636\u0645\u0627\u0645\u060C \u0623\u062F\u062E\u0644 \u0631\u0645\u0632\u0643 \u0648\u062D\u062F\u0651\u062F "\u0623\u0646\u0627 \u0627\u0644\u0642\u0627\u0626\u062F".' },
    "welcome.skipHint": { en: "No code yet? Start solo \u2014 you can join your alliance later from the Alliance tab.", he: "\u05D0\u05D9\u05DF \u05E2\u05D3\u05D9\u05D9\u05DF \u05E7\u05D5\u05D3? \u05D4\u05EA\u05D7\u05DC \u05DC\u05D1\u05D3 \u2014 \u05EA\u05D5\u05DB\u05DC \u05DC\u05D4\u05E6\u05D8\u05E8\u05E3 \u05DC\u05D1\u05E8\u05D9\u05EA \u05DE\u05D0\u05D5\u05D7\u05E8 \u05D9\u05D5\u05EA\u05E8 \u05DE\u05D8\u05D0\u05D1 \u05D4\u05D1\u05E8\u05D9\u05EA.", es: "\xBFSin c\xF3digo? Empieza solo \u2014 \xFAnete a tu alianza luego.", pt: "Sem c\xF3digo? Comece sozinho \u2014 entre na alian\xE7a depois.", fr: "Pas de code ? Commence en solo \u2014 rejoins ton alliance plus tard.", de: "Noch kein Code? Starte solo \u2014 tritt sp\xE4ter bei.", ru: "\u041D\u0435\u0442 \u043A\u043E\u0434\u0430? \u041D\u0430\u0447\u043D\u0438\u0442\u0435 \u0441\u043E\u043B\u043E \u2014 \u0432\u0441\u0442\u0443\u043F\u0438\u0442\u0435 \u0432 \u0430\u043B\u044C\u044F\u043D\u0441 \u043F\u043E\u0437\u0436\u0435.", ar: "\u0644\u0627 \u064A\u0648\u062C\u062F \u0631\u0645\u0632\u061F \u0627\u0628\u062F\u0623 \u0645\u0646\u0641\u0631\u062F\u064B\u0627 \u2014 \u0627\u0646\u0636\u0645 \u0644\u0627\u062D\u0642\u064B\u0627." },
    "footer.howItWorks": { en: "How it works", he: "\u05D0\u05D9\u05DA \u05D6\u05D4 \u05E2\u05D5\u05D1\u05D3", es: "C\xF3mo funciona", pt: "Como funciona", fr: "Comment \xE7a marche", de: "So funktioniert es", it: "Come funziona", nl: "Hoe het werkt", ru: "\u041A\u0430\u043A \u044D\u0442\u043E \u0440\u0430\u0431\u043E\u0442\u0430\u0435\u0442", pl: "Jak to dzia\u0142a", tr: "Nas\u0131l \xE7al\u0131\u015F\u0131r", ar: "\u0643\u064A\u0641 \u064A\u0639\u0645\u0644", zh: "\u4F7F\u7528\u8BF4\u660E", ja: "\u4F7F\u3044\u65B9", ko: "\uC0AC\uC6A9 \uBC29\uBC95", id: "Cara kerja", vi: "C\xE1ch ho\u1EA1t \u0111\u1ED9ng", th: "\u0E27\u0E34\u0E18\u0E35\u0E43\u0E0A\u0E49\u0E07\u0E32\u0E19" },

    "sync.done": { en: "Loaded! This device is now synced.", he: "\u05E0\u05D8\u05E2\u05DF! \u05D4\u05DE\u05DB\u05E9\u05D9\u05E8 \u05D4\u05D6\u05D4 \u05DE\u05E1\u05D5\u05E0\u05DB\u05E8\u05DF \u05E2\u05DB\u05E9\u05D9\u05D5.", es: "\xA1Cargado! Este dispositivo est\xE1 sincronizado.", pt: "Carregado! Este dispositivo est\xE1 sincronizado.", fr: "Charg\xE9 ! Cet appareil est synchronis\xE9.", de: "Geladen! Dieses Ger\xE4t ist jetzt synchron.", ru: "\u0417\u0430\u0433\u0440\u0443\u0436\u0435\u043D\u043E! \u0423\u0441\u0442\u0440\u043E\u0439\u0441\u0442\u0432\u043E \u0441\u0438\u043D\u0445\u0440\u043E\u043D\u0438\u0437\u0438\u0440\u043E\u0432\u0430\u043D\u043E.", ar: "\u062A\u0645 \u0627\u0644\u062A\u062D\u0645\u064A\u0644! \u0627\u0644\u062C\u0647\u0627\u0632 \u0645\u062A\u0632\u0627\u0645\u0646 \u0627\u0644\u0622\u0646." },
    "sync.warn": { en: "Loading replaces this device\u2019s current data with the synced data. Edits sync last-write-wins, so update on one device at a time.", he: '\u05D8\u05E2\u05D9\u05E0\u05D4 \u05DE\u05D7\u05DC\u05D9\u05E4\u05D4 \u05D0\u05EA \u05D4\u05E0\u05EA\u05D5\u05E0\u05D9\u05DD \u05D4\u05E0\u05D5\u05DB\u05D7\u05D9\u05D9\u05DD \u05D1\u05DE\u05DB\u05E9\u05D9\u05E8 \u05D1\u05E0\u05EA\u05D5\u05E0\u05D9\u05DD \u05D4\u05DE\u05E1\u05D5\u05E0\u05DB\u05E8\u05E0\u05D9\u05DD. \u05E2\u05D3\u05DB\u05D5\u05E0\u05D9\u05DD \u05E0\u05E9\u05DE\u05E8\u05D9\u05DD \u05DC\u05E4\u05D9 "\u05D4\u05D0\u05D7\u05E8\u05D5\u05DF \u05DE\u05E0\u05E6\u05D7", \u05D0\u05D6 \u05E2\u05D3\u05DB\u05DF \u05D1\u05DE\u05DB\u05E9\u05D9\u05E8 \u05D0\u05D7\u05D3 \u05D1\u05DB\u05DC \u05E4\u05E2\u05DD.', es: "Cargar reemplaza los datos actuales. Edita en un dispositivo a la vez.", pt: "Carregar substitui os dados atuais. Edite em um dispositivo por vez.", fr: "Le chargement remplace les donn\xE9es actuelles. Modifie un appareil \xE0 la fois.", de: "Laden ersetzt die aktuellen Daten. Bearbeite jeweils ein Ger\xE4t.", ru: "\u0417\u0430\u0433\u0440\u0443\u0437\u043A\u0430 \u0437\u0430\u043C\u0435\u043D\u0438\u0442 \u0442\u0435\u043A\u0443\u0449\u0438\u0435 \u0434\u0430\u043D\u043D\u044B\u0435. \u0420\u0435\u0434\u0430\u043A\u0442\u0438\u0440\u0443\u0439\u0442\u0435 \u043F\u043E \u043E\u0434\u043D\u043E\u043C\u0443 \u0443\u0441\u0442\u0440\u043E\u0439\u0441\u0442\u0432\u0443.", ar: "\u0627\u0644\u062A\u062D\u0645\u064A\u0644 \u064A\u0633\u062A\u0628\u062F\u0644 \u0627\u0644\u0628\u064A\u0627\u0646\u0627\u062A \u0627\u0644\u062D\u0627\u0644\u064A\u0629. \u0639\u062F\u0651\u0644 \u062C\u0647\u0627\u0632\u064B\u0627 \u0648\u0627\u062D\u062F\u064B\u0627 \u0641\u064A \u0643\u0644 \u0645\u0631\u0629." },

  };
  var T = (key, lang = "en", vars) => {
    let s = TRANSLATIONS[lang] && TRANSLATIONS[lang][key] || I18N[key] && (I18N[key][lang] || I18N[key].en) || TRANSLATIONS.en && TRANSLATIONS.en[key] || key;
    if (vars) for (const k in vars) s = s.split("{" + k + "}").join(String(vars[k]));
    return s;
  };
  var XP_TIERS = [10, 100];
  var XP_TIER_LABELS = {
    10: { name: "10 XP Part", color: "#22c55e", short: "Green" },
    100: { name: "100 XP Part", color: "#a855f7", short: "Purple" }
  };
  var totalXp = (r) => {
    if (!r) return 0;
    let t = r.xpBanked || 0;
    if (r.xpParts) {
      XP_TIERS.forEach((tier) => {
        t += tier * (r.xpParts[String(tier)] || 0);
      });
    }
    if (r.xp != null && r.xpBanked == null) t += r.xp;
    if (r.gearMerge) t += (r.gearMerge.grey || 0) * 10 + (r.gearMerge.green || 0) * 30 + (r.gearMerge.blue || 0) * 60 + (r.gearMerge.purple || 0) * 150;
    return t;
  };
  var spendXp = (r, amount) => {
    if (!r || amount <= 0) return r;
    if ((r.xpBanked || 0) >= amount) {
      r.xpBanked -= amount;
      return r;
    }
    let deficit = amount - (r.xpBanked || 0);
    r.xpBanked = 0;
    for (const tier of [...XP_TIERS].sort((a, b) => b - a)) {
      if (deficit <= 0) break;
      const have = r.xpParts?.[String(tier)] || 0;
      if (have === 0) continue;
      const needCount = Math.ceil(deficit / tier);
      const useCount = Math.min(have, needCount);
      r.xpParts[String(tier)] = have - useCount;
      const xpFromParts = useCount * tier;
      if (xpFromParts > deficit) {
        r.xpBanked += xpFromParts - deficit;
        deficit = 0;
      } else {
        deficit -= xpFromParts;
      }
    }
    return r;
  };
